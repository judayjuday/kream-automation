        <td style="font-size:12px">${myBidCell0}</td>
        <td style="background:var(--accent-light)">
          <input type="number" class="form-input" value="${bp}" step="1000"
            style="width:80px;height:26px;font-size:12px;font-weight:700;text-align:right"
            onchange="qSetBidPrice(${item.id},null,this.value)">
        </td>
        <td>${strategyDd(item.id, item.bid_strategy)}</td>
        <td>
          <input type="number" min="1" value="${item.quantity||1}"
            style="width:48px;height:26px;font-size:12px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:0 4px"
            onchange="qSaveResultQty(${item.id}, this.value)"
            onkeydown="if(event.key==='Enter')this.blur()">
        </td>
        <td style="color:${profitBg?'#fff':profitColor};font-weight:600;font-size:12px;${profitBg?'background:'+profitBg:''}">${pi.profit>0?'+':''}${pi.profit.toLocaleString()} (${pi.marginRate}%)${profitWarn}</td>
        <td style="font-size:11px">${gosiLabel}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-outline btn-sm" onclick="qShowDetail(${item.id})" style="padding:1px 5px;font-size:11px" title="상세 분석">&#x1f4ca;</button>
          <button class="btn btn-outline btn-sm" onclick="queueCopy(${item.id})" style="padding:1px 5px;font-size:11px;margin-left:2px" title="동일 품번으로 새 항목 추가">복사</button>
          <button class="btn btn-outline btn-sm" onclick="qDeleteResult(${item.id})" style="padding:1px 5px;font-size:11px;margin-left:2px;color:var(--danger);border-color:var(--danger)" title="결과 삭제">✕</button>
        </td>
      </tr>`;
    } else {
      // 신발 헤더
      const szCount = r.sizeMargins.length;
      let profitSizes = 0;
      r.sizeMargins.forEach(sz => { if (calcProfitForPrice(getBidPrice(item, sz), sz.totalCost).profit > 0) profitSizes++; });

      html += `<tr style="background:var(--bg)">
        <td><input type="checkbox" class="q-res-chk" data-id="${item.id}" ${profitSizes > 0 ? 'checked' : ''}></td>
        <td><a href="#" onclick="qShowDetail(${item.id});return false" style="color:var(--blue);font-weight:700;text-decoration:none" title="클릭하여 상세 보기">${item.model}</a> ${marketBadge}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.nameEn||''}">${r.nameKr||r.nameEn||'-'}</td>
        <td>${catDd}</td>
        <td colspan="4" style="font-size:12px;color:var(--text2)">${szCount}사이즈 (마진OK: ${profitSizes})
          <button onclick="qToggleSizes(${item.id})" class="btn btn-outline btn-sm" style="padding:1px 6px;font-size:10px;margin-left:4px" id="q-sz-toggle-${item.id}">접기</button></td>
        <td>${strategyDd(item.id, item.bid_strategy)}</td>
        <td>
          <input type="number" min="1" value="${item.quantity||1}"
            style="width:48px;height:26px;font-size:12px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:0 4px"
            onchange="qSaveResultQty(${item.id}, this.value)"
            onkeydown="if(event.key==='Enter')this.blur()">
        </td>
        <td style="font-size:11px">${gosiLabel}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-outline btn-sm" onclick="qShowDetail(${item.id})" style="padding:1px 5px;font-size:11px">&#x1f4ca;</button>
          <button class="btn btn-outline btn-sm" onclick="queueCopy(${item.id})" style="padding:1px 5px;font-size:11px;margin-left:2px" title="동일 품번으로 새 항목 추가">복사</button>
          <button class="btn btn-outline btn-sm" onclick="qDeleteResult(${item.id})" style="padding:1px 5px;font-size:11px;margin-left:2px;color:var(--danger);border-color:var(--danger)" title="결과 삭제">✕</button>
        </td>

      r.sizeMargins.forEach(sz => {

        const szBg = pi.profit < 0 ? 'var(--danger);color:#fff'
                   : pi.profit < 5000 ? 'var(--danger-light)'
                   : pi.profit < 10000 ? 'var(--warning-light)'
                   : '';
        const szWarn = pi.profit < 5000 ? ' 마진부족' : '';

        const szCompBadge = renderCompBadge(sz.comp);
        const myBidCellSz = renderMyBidCell(r.productId, sz.size);

          <td></td><td></td>
          <td>${sz.totalCost.toLocaleString()}</td>
          <td>${szKp ? szKp.toLocaleString() : '-'} ${szCompBadge}</td>

            <input type="number" class="form-input" value="${bp}" step="1000"

  tbody.innerHTML = html;

  // 접기 상태 복원 (기본은 펼침, _collapsedSizes에 있으면 접기)
  _collapsedSizes.forEach(id => {

    const btn = document.getElementById(`q-sz-toggle-${id}`);
    if (rows.length > 0) {
      rows.forEach(r => r.style.display = 'none');
      if (btn) btn.textContent = '펼치기';
    }
  });

  const failed = queueData.filter(q => q.status === '실패').length;
  const unclassified = completed.filter(q => q.category === '미분류').length;
  let summary = `완료 ${completed.length}건 | 실패 ${failed}건`;
  if (unclassified > 0) summary += ` | <span style="color:var(--danger);font-weight:600">미분류 ${unclassified}건</span>`;
  document.getElementById('q-result-summary').innerHTML = summary;
}

function qDeleteResult(id) {
  const item = queueData.find(q => q.id === id);
  if (!item) return;
  if (!confirm(`"${item.model}" 결과를 삭제하시겠습니까?`)) return;
  // bidPrices에서 관련 키 제거
  delete bidPrices[id];
  if (item.result && item.result.sizeMargins) {
    item.result.sizeMargins.forEach(sz => delete bidPrices[`${id}_${sz.size}`]);
  }
  // queueData에서 제거
  queueData = queueData.filter(q => q.id !== id);
  // 서버에서도 삭제
  fetch('/api/queue/' + id, { method: 'DELETE' });
  queueRender();
  queueBuildResults();
  // 결과가 없으면 결과 카드 숨김
  if (queueData.filter(q => q.status === '완료' && q.result).length === 0) {
    document.getElementById('q-result-card').style.display = 'none';
  }
}

function qDeleteAllResults() {
  const completed = queueData.filter(q => q.status === '완료' && q.result);
  if (completed.length === 0) { alert('삭제할 결과가 없습니다'); return; }
  if (!confirm(`완료된 ${completed.length}건의 결과를 모두 삭제하시겠습니까?`)) return;
  // bidPrices 전체 초기화
  completed.forEach(item => {
    delete bidPrices[item.id];
    if (item.result && item.result.sizeMargins) {
      item.result.sizeMargins.forEach(sz => delete bidPrices[`${item.id}_${sz.size}`]);
    }
    fetch('/api/queue/' + item.id, { method: 'DELETE' });
  });
  queueData = queueData.filter(q => !(q.status === '완료' && q.result));
  queueRender();
  document.getElementById('q-result-card').style.display = 'none';
  document.getElementById('q-result-tbody').innerHTML = '';
}

function qSetBidPrice(id, size, val) {
  const price = parseInt(val) || 0;
  const key = size ? `${id}_${size}` : id;
  if (price <= 0) {
    delete bidPrices[key]; // 0 또는 미입력 시 자동 계산으로 복귀
  } else {
    bidPrices[key] = price;
  }
  queueBuildResults(); // 마진 실시간 재계산
}

function qChangeStrategy(id, strategy) {
  const item = queueData.find(q => q.id === id);
  if (!item) return;
  item.bid_strategy = strategy || '';
  // 전략 변경 시 수동 입찰가 초기화 (자동 계산으로)
  delete bidPrices[id];
  if (item.result && item.result.sizeMargins) {
    item.result.sizeMargins.forEach(sz => delete bidPrices[`${id}_${sz.size}`]);
  }
  // 서버에도 반영
  fetch('/api/queue/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ bid_strategy: strategy || '' })
  });
  queueBuildResults();
}

const _collapsedSizes = new Set(); // 접기 상태 유지 (기본은 펼침)

function qToggleSizes(id) {
  const rows = document.querySelectorAll(`.q-sz-row-${id}`);
  const btn = document.getElementById(`q-sz-toggle-${id}`);
  const isVisible = rows[0] && rows[0].style.display !== 'none';
  rows.forEach(r => r.style.display = isVisible ? 'none' : '');
  if (btn) btn.textContent = isVisible ? '펼치기' : '접기';
  if (isVisible) _collapsedSizes.add(id); else _collapsedSizes.delete(id);
}

function queueToggleAll(master) {
  document.querySelectorAll('.q-res-chk, .q-sz-chk').forEach(c => c.checked = master.checked);
}

// ── 📊 상세 분석 패널 ──
function _bidGroupHtml(bids, color, sortAsc) {
  if (!bids || bids.length === 0) return '<span class="text-muted">데이터 없음 (로그인 필요)</span>';
  const g = {};
  bids.forEach(b => { g[b.price] = (g[b.price]||0) + (b.quantity||1); });
  return Object.entries(g).sort((a,b) => sortAsc ? a[0]-b[0] : b[0]-a[0])
    .map(([p,c]) => `<span style="color:${color}">${parseInt(p).toLocaleString()}</span>(${c})`).join(' / ');
}

function _getDeliveryTarget(sdp, sizeFilter) {
  if (!sdp || sdp.length === 0) return null;
  return sizeFilter ? sdp.find(s => s.size === sizeFilter) : (sdp.length === 1 ? sdp[0] : sdp.find(s => s.size === 'ONE SIZE') || sdp[0]);
}

function _deliveryOneLine(sdp, sizeFilter) {
  const t = _getDeliveryTarget(sdp, sizeFilter);
  if (!t) return '';
  const parts = [];
  if (t.sellFast != null) parts.push(`<span style="color:var(--warning)">빠른</span> ${t.sellFast.toLocaleString()}`);
  if (t.sellNormal != null) parts.push(`<span style="color:var(--text2)">일반</span> ${t.sellNormal.toLocaleString()}`);
  if (t.sellOverseas != null) parts.push(`<span style="color:var(--blue)">해외</span> ${t.sellOverseas.toLocaleString()}`);
  if (parts.length === 0) return '';
  return `<div style="margin-top:4px;padding:4px 8px;background:#f0f7ff;border-radius:4px;font-size:11px"><strong>배송별:</strong> ${parts.join(' <span style="color:var(--border)">|</span> ')}</div>`;
}

function _simTable(tc, instantBuy, currentBid, itemId, sizeKey) {
  const prices = [];
  const base = Math.floor(tc / 1000) * 1000;
  for (let p = base - 5000; p <= base + 40000; p += 5000) { if (p > 0) prices.push(p); }
  if (instantBuy && !prices.includes(instantBuy)) prices.push(instantBuy);
  if (currentBid && !prices.includes(currentBid)) prices.push(currentBid);
  prices.sort((a,b) => a - b);

  let h = `<table style="font-size:12px;width:100%"><thead><tr><th>판매가</th><th>수수료</th><th>정산금</th><th>순이익</th><th>마진율</th><th></th></tr></thead><tbody>`;
  prices.forEach(sp => {
    const pi = calcProfitForPrice(sp, tc);
    const isK = sp === instantBuy, isC = sp === currentBid;
    let rs, label;
    if (isC && isK) {
      rs = 'background:linear-gradient(90deg,var(--accent-light),#fff8e1);font-weight:700;border-left:3px solid var(--warning)';
      label = ' &#8592; <span style="color:var(--accent)">현재 입찰가</span> / <span style="color:var(--warning)">즉시구매가</span>';
    } else if (isC) {
      rs = 'background:var(--accent-light);font-weight:700;border-left:3px solid var(--accent)';
      label = ' &#8592; <span style="color:var(--accent)">현재 입찰가</span>';
    } else if (isK) {
      rs = 'background:#fff8e1;border-left:3px solid var(--warning)';
      label = ' &#8592; <span style="color:var(--warning)">즉시구매가</span>';
    } else {
      rs = ''; label = '';
    }
    const pc = pi.profit > 0 ? 'var(--accent)' : 'var(--danger)';
    h += `<tr style="${rs}"><td>${sp.toLocaleString()}</td><td style="color:var(--text2)">-${pi.totalFee.toLocaleString()}</td><td>${pi.settlement.toLocaleString()}</td><td style="color:${pc};font-weight:600">${pi.profit>0?'+':''}${pi.profit.toLocaleString()}</td><td style="color:${pc}">${pi.marginRate}%</td><td style="font-size:10px">${label}</td></tr>`;
  });
  h += '</tbody></table>';
  return h;
}

function qLoadPriceHistory(productId) {
  const status = document.getElementById('q-ph-status');
  const table = document.getElementById('q-ph-table');
  status.textContent = '조회 중...';
  fetch(`/api/price-history/${productId}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) { status.textContent = data.error; return; }
      const summary = data.summary || [];
      if (summary.length === 0) {
        table.innerHTML = '<div class="text-muted">수집 이력 없음</div>';
        status.textContent = '';
        return;
      }
      status.textContent = `최근: ${(data.latestAt||'').substring(0,16).replace('T',' ')} (총 ${data.total}건)`;

      let h = '<table style="width:100%;font-size:12px;margin-top:4px"><thead><tr>';
      h += '<th>사이즈</th><th>빠른배송</th><th>일반배송</th><th>해외배송</th><th style="background:var(--accent-light)">최저가</th>';
      h += '</tr></thead><tbody>';
      summary.sort((a,b) => {
        const na = parseFloat((a.size||'').replace(/[^0-9.]/g,'')) || 0;
        const nb = parseFloat((b.size||'').replace(/[^0-9.]/g,'')) || 0;
        return na - nb;
      });
      summary.forEach(s => {
        const fast = s['빠른배송'] ? (s['빠른배송'].buy||'-').toLocaleString() : '-';
        const normal = s['일반배송'] ? (s['일반배송'].buy||'-').toLocaleString() : '-';
        const overseas = s['해외배송'] ? (s['해외배송'].buy||'-').toLocaleString() : '-';
        const lowest = s['최저가'] ? (s['최저가'].buy||'-').toLocaleString() : '-';
        const lowestVal = s['최저가'] ? s['최저가'].buy : null;
        const bgStyle = lowestVal ? 'background:var(--accent-light);font-weight:700' : '';
        h += `<tr>
          <td style="font-weight:600">${s.size}</td>
          <td>${fast}</td><td>${normal}</td><td>${overseas}</td>
          <td style="${bgStyle}">${lowest}</td>
        </tr>`;
      });
      h += '</tbody></table>';
      table.innerHTML = h;
    })
    .catch(e => { status.textContent = '오류: ' + e.message; });
}

      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;line-height:1.8">
        <div>
          <div>국내 최저가 (빠른/일반): <strong>${_comp.domestic_min ? _comp.domestic_min.toLocaleString()+'원' : '없음'}</strong></div>

  // ── 9. 입찰가 수정 ──
  if (!sz) {
    const pi = calcProfitForPrice(bp, tc);

    h += `<div style="margin-top:12px;display:flex;align-items:center;gap:8px;font-size:13px">

  }

  return h;
}

function qDetailGosiUpdate(id, field, value) {
  const item = queueData.find(q => q.id === id);
  if (!item) return;
  if (!item.gosi) item.gosi = {};
  item.gosi[field] = value;
  fetch('/api/queue/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ gosi: item.gosi })
  });
}

function qDetailQtyUpdate(id, value) {
  const qty = parseInt(value) || 1;
  const item = queueData.find(q => q.id === id);
  if (item) item.quantity = qty;
  fetch('/api/queue/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ quantity: qty })
  });
  queueRender();
}

      <input type="text" class="form-input" id="qm-gosi-mfr" value="${g.manufacturer||''}" style="height:28px;font-size:12px">
    </div>
  </div>
  <div style="margin-bottom:16px">
    <div style="font-weight:600;margin-bottom:8px">입찰가 설정</div>
    <div style="display:flex;gap:12px;align-items:center;font-size:13px;margin-bottom:8px">
      <label><input type="radio" name="qm-margin" value="10" ${(item.bid_strategy||item.selectedMargin||'undercut')==='10'?'checked':''}> 마진10%</label>
      <label><input type="radio" name="qm-margin" value="15" ${(item.bid_strategy||item.selectedMargin||'undercut')==='15'?'checked':''}> 마진15%</label>
      <label><input type="radio" name="qm-margin" value="20" ${(item.bid_strategy||item.selectedMargin||'undercut')==='20'?'checked':''}> 마진20%</label>
      <label><input type="radio" name="qm-margin" value="undercut" ${(item.bid_strategy||item.selectedMargin||'undercut')==='undercut'?'checked':''}> 언더컷 -${(SETTINGS.undercutAmount||1000).toLocaleString()}원</label>
      <label><input type="radio" name="qm-margin" value="custom" ${bidPrices[item.id]!=null?'checked':''}> 직접 입력</label>
    </div>
    <div style="display:flex;gap:8px;align-items:center;font-size:13px">
      <span>입찰가:</span>
      <input type="number" class="form-input" id="qm-bid-price" value="${currentBid}" step="1000" style="width:120px;height:32px;font-size:14px;font-weight:700" oninput="qModalCalcPreview()">
      <span id="qm-bid-preview" style="font-size:12px"></span>
    </div>
  </div>`;

  document.getElementById('q-modal-body').innerHTML = body;
  // 라디오 변경 시 입찰가 자동 업데이트
  document.querySelectorAll('input[name="qm-margin"]').forEach(radio => {
    radio.addEventListener('change', () => {
      if (radio.value === 'undercut') {
        const kp = r.instantBuyPrice || 0;
        const uc = SETTINGS.undercutAmount || 1000;
        document.getElementById('qm-bid-price').value = Math.max(0, roundUp1000(kp - uc));
      } else if (radio.value !== 'custom') {
        const mg = (r.margins || {})[`margin_${radio.value}`];
        if (mg) document.getElementById('qm-bid-price').value = roundUp1000(mg.sell_price);
      }
      qModalCalcPreview();
    });
  });
  qModalCalcPreview();
  document.getElementById('q-modal-overlay').style.display = 'flex';
}

function qModalCalcPreview() {
  const item = queueData.find(q => q.id === qModalItemId);
  if (!item) return;
  const price = parseInt(document.getElementById('qm-bid-price').value) || 0;
  const tc = item.result?.totalCost || 0;
  const pi = calcProfitForPrice(price, tc);
  const color = pi.profit > 0 ? 'var(--accent)' : 'var(--danger)';
  document.getElementById('qm-bid-preview').innerHTML =
    `→ 수수료 ${pi.totalFee.toLocaleString()} | 정산 ${pi.settlement.toLocaleString()} | <span style="color:${color};font-weight:700">순이익 ${pi.profit>0?'+':''}${pi.profit.toLocaleString()} (${pi.marginRate}%)</span>`;
}

function qModalClose() {
  document.getElementById('q-modal-overlay').style.display = 'none';
  qModalItemId = null;
}

function qModalSave() {
  if (!qModalItemId) return;
  const bidPrice = parseInt(document.getElementById('qm-bid-price').value) || 0;
  const marginRadio = document.querySelector('input[name="qm-margin"]:checked')?.value || '15';

  // 직접 입력이면 bidPrices에 저장
  if (marginRadio === 'custom') {
    bidPrices[qModalItemId] = bidPrice;
  } else {
    delete bidPrices[qModalItemId];
  }

  const updates = {
    category: document.getElementById('qm-category').value,
    shipping: parseInt(document.getElementById('qm-ship').value) || 8000,
    quantity: parseInt(document.getElementById('qm-qty').value) || 1,
    bid_strategy: marginRadio,
    selectedMargin: (marginRadio !== 'custom' && marginRadio !== 'undercut') ? marginRadio : '15',
    gosi: {
      type: document.getElementById('qm-gosi-type').value,
      material: document.getElementById('qm-gosi-material').value,
      color: document.getElementById('qm-gosi-color').value,
      size: document.getElementById('qm-gosi-size').value,
      manufacturer: document.getElementById('qm-gosi-mfr').value,
    }
  };

  fetch('/api/queue/' + qModalItemId, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(updates)
  }).then(r => r.json()).then(res => {
    if (res.ok) {
      const idx = queueData.findIndex(q => q.id === qModalItemId);
      if (idx >= 0) Object.assign(queueData[idx], updates);
      queueRender();
      queueBuildResults();
    }
    qModalClose();
  });
}

// ── 등록 전 최종 확인 ──
// 공통: 선택된 상품에서 입찰 목록 빌드
function _buildBidList() {
  const checked = Array.from(document.querySelectorAll('.q-res-chk:checked'));
  if (checked.length === 0) { alert('등록할 상품을 선택하세요'); return null; }

  const ids = checked.map(c => parseInt(c.dataset.id));
  const items = queueData.filter(q => ids.includes(q.id) && q.result);

  const unclassified = items.filter(q => q.category === '미분류');
  if (unclassified.length > 0) {
    alert(`미분류 상품: ${unclassified.map(q=>q.model).join(', ')}\n카테고리를 선택한 후 다시 시도하세요.`);
    return null;
  }

  const bidList = [];
  items.forEach(item => {
    const r = item.result;
    const g = item.gosi || r.gosi || {};
    const hasSizes = r.sizeMargins && r.sizeMargins.length > 0;
    if (hasSizes) {
      const checkedSizes = new Set();
      document.querySelectorAll(`.q-sz-chk[data-id="${item.id}"]:checked`).forEach(c => checkedSizes.add(c.dataset.size));
      const useSizes = checkedSizes.size > 0 ? checkedSizes : new Set(r.sizeMargins.map(s=>s.size));
      r.sizeMargins.forEach(sz => {
        if (!useSizes.has(sz.size)) return;
        const bp = getBidPrice(item, sz);
        if (!bp) return;
        bidList.push({ model: item.model, size: sz.size, price: bp, cost: sz.totalCost,
          productId: r.productId, nameEn: r.nameEn||'', qty: item.quantity,
          gosi: g, category: item.category, gosiAlready: false, bid_days: item.bid_days || 30 });
      });
    } else {
      const bp = getBidPrice(item);
      if (!bp) return;
      bidList.push({ model: item.model, size: item.size || 'ONE SIZE', price: bp, cost: r.totalCost||0,
        productId: r.productId, nameEn: r.nameEn||'', qty: item.quantity,
        gosi: g, category: item.category, gosiAlready: false, bid_days: item.bid_days || 30 });
    }
  });

  if (bidList.length === 0) { alert('등록 가능한 상품이 없습니다'); return null; }
  return bidList;
}

function _bidListSummary(bidList) {
  let msg = `=== 최종 입찰 확인 (${bidList.length}건) ===\n\n`;
  bidList.forEach(b => {
    const pi = calcProfitForPrice(b.price, b.cost);
    msg += `${b.model} ${b.size}: ${b.price.toLocaleString()}원 (마진 ${pi.profit>0?'+':''}${pi.profit.toLocaleString()}원)\n`;
  });
  return msg;
}

// ── 마진 5,000원 미만 사이즈 일괄 제거 ──
function qRemoveLowMargin() {
  const MIN_PROFIT = 5000;
  let removed = 0;
  queueData.forEach(item => {
    if (!item.result) return;
    const r = item.result;
    if (r.sizeMargins && r.sizeMargins.length > 0) {
      const before = r.sizeMargins.length;
      r.sizeMargins = r.sizeMargins.filter(sz => {
        const bp = getBidPrice(item, sz);
        const pi = calcProfitForPrice(bp, sz.totalCost);
        return pi.profit >= MIN_PROFIT;
      });
      removed += before - r.sizeMargins.length;
      // sizes 배열도 동기화
      if (item.sizes) {
        const keepSizes = new Set(r.sizeMargins.map(s => s.size));
        item.sizes = item.sizes.filter(s => keepSizes.has(s.size));
      }
    } else {
      const bp = getBidPrice(item);
      const pi = calcProfitForPrice(bp, r.totalCost || 0);
      if (pi.profit < MIN_PROFIT) {
        item.status = '마진부족';
        item.result = null;
        removed++;
      }
    }
  });
  if (removed === 0) { alert('마진 5,000원 미만 항목이 없습니다.'); return; }
  alert(`마진 5,000원 미만 ${removed}건 제거 완료`);
  queueBuildResults();
  fetch('/api/queue/list').then(r => r.json()); // 서버 동기화는 별도
}

// ── 대량입찰 엑셀 자동 업로드 (엑셀 생성 + 고시정보 등록 + 업로드 한번에) ──
function queueBulkExcelUpload() {
  const bidList = _buildBidList();
  if (!bidList) return;

  let msg = _bidListSummary(bidList);
  msg += '\n대량입찰 엑셀을 생성하고 판매자센터에 자동 업로드합니다.\n';
  msg += '⚠️ 고시정보 미등록 상품은 먼저 자동 등록 후 엑셀 업로드됩니다.\n\n진행하시겠습니까?';
  if (!confirm(msg)) return;

  const btn = document.getElementById('q-bulk-upload-btn');
  btn.disabled = true;
  btn.textContent = '처리 중...';
  const logArea = document.getElementById('q-auto-log');
  logArea.style.display = 'block';
  logArea.innerHTML = '';
  function addLog(msg, cls) {
    logArea.innerHTML += `<div class="${cls||''}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    logArea.scrollTop = logArea.scrollHeight;
  }

  // 1단계: 고시정보 미등록 상품 처리
  const needGosi = bidList.filter(b => !b.gosiAlready);
  const uniqueProducts = [...new Map(needGosi.map(b => [b.productId, b])).values()];

  addLog(`입찰 대상: ${bidList.length}건, 고시정보 등록 필요: ${uniqueProducts.length}건`, 'log-info');

  // 순차 처리: 고시정보 → 엑셀 생성 → 업로드
  async function runBulkFlow() {
    // 1단계: 고시정보 등록 (필요한 상품만)
    if (uniqueProducts.length > 0) {
      addLog(`[1/3] 고시정보 등록 시작 (${uniqueProducts.length}건)...`, 'log-info');
      for (let i = 0; i < uniqueProducts.length; i++) {
        const b = uniqueProducts[i];
        addLog(`  [${i+1}/${uniqueProducts.length}] #${b.productId} ${b.model} 고시정보 등록...`, 'log-info');
        try {
          const res = await fetch('/api/product-info', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId: b.productId, gosi: { ...b.gosi, category: b.category } })
          }).then(r => r.json());
          // 태스크 폴링
          if (res.taskId) {
            let done = false;
            for (let t = 0; t < 30 && !done; t++) {
              await new Promise(r => setTimeout(r, 2000));
              const task = await fetch(`/api/task/${res.taskId}`).then(r => r.json());
              if (task.status === 'done') { addLog(`  ✓ #${b.productId} 고시정보 완료`, 'log-success'); done = true; }
              else if (task.status === 'error') { addLog(`  ✗ #${b.productId} 고시정보 실패`, 'log-error'); done = true; }
            }
          }
        } catch (e) { addLog(`  ✗ #${b.productId} 오류: ${e.message}`, 'log-error'); }
      }
    } else {
      addLog('[1/3] 고시정보 등록 — 모두 등록 완료 상태', 'log-info');
    }

    // 2단계: 엑셀 생성
    addLog(`[2/3] 대량입찰 엑셀 생성 중 (${bidList.length}건)...`, 'log-info');
    const bulkItems = bidList.map(b => ({
      productId: b.productId, model: b.model, nameEn: b.nameEn,
      size: b.size, price: b.price, quantity: b.qty,
    }));
    try {
      const genRes = await fetch('/api/bulk/generate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: bulkItems })
      }).then(r => r.json());
      if (!genRes.ok) { addLog('✗ 엑셀 생성 실패: ' + (genRes.error || ''), 'log-error'); return; }
      addLog(`✓ 엑셀 생성 완료 (${genRes.count}건)`, 'log-success');
    } catch (e) { addLog('✗ 엑셀 생성 오류: ' + e.message, 'log-error'); return; }

    // 3단계: 판매자센터 업로드
    addLog('[3/3] 판매자센터 엑셀 업로드 중...', 'log-info');
    try {
      const upRes = await fetch('/api/bulk/upload', { method: 'POST' }).then(r => r.json());
      if (upRes.taskId) {
        let done = false;
        for (let t = 0; t < 60 && !done; t++) {
          await new Promise(r => setTimeout(r, 2000));
          const task = await fetch(`/api/task/${upRes.taskId}`).then(r => r.json());
          task.logs.forEach(l => {
            if (!logArea.innerHTML.includes(l.msg)) {
              addLog(l.msg, l.level === 'error' ? 'log-error' : l.level === 'success' ? 'log-success' : 'log-info');
            }
          });
          if (task.status === 'done') { addLog('✓ 대량입찰 업로드 완료!', 'log-success'); done = true; }
          else if (task.status === 'error') { addLog('✗ 업로드 실패', 'log-error'); done = true; }
        }
      }
    } catch (e) { addLog('✗ 업로드 오류: ' + e.message, 'log-error'); }

    btn.disabled = false;
    btn.textContent = '대량입찰 엑셀 업로드';
    addLog('=== 처리 완료 ===', 'log-info');
  }

  runBulkFlow();
}

// 옵션 2: 자동 입찰 (Playwright)
function queueConfirmAutoBid() {
  const bidList = _buildBidList();
  if (!bidList) return;

  // 비정상 시장 상품 경고
  const abnormalModels = [];
  bidList.forEach(bi => {
    const item = queueData.find(q => q.id === bi._queueId || q.model === bi.model);
    if (item && item.result && item.result.marketType === '비정상 시장') {
      if (!abnormalModels.includes(item.model)) abnormalModels.push(item.model);
    }
  });
  if (abnormalModels.length > 0) {
    const warnMsg = `다음 상품은 비정상 시장입니다:\n${abnormalModels.join(', ')}\n\n평균 마진율이 마이너스입니다. 그래도 입찰하시겠습니까?`;
    if (!confirm(warnMsg)) return;
  }

  let msg = _bidListSummary(bidList);
  msg += '\n⚠️ Playwright로 판매자센터에 자동 로그인하여\n고시정보 등록 + 판매 입찰을 자동 실행합니다.\n\n먼저 내 입찰 현황을 확인하고 중복을 필터링합니다.\n진행하시겠습니까?';
  if (!confirm(msg)) return;

  const btn = document.getElementById('q-auto-bid-btn');
  btn.disabled = true;
  btn.textContent = '입찰 현황 확인 중...';
  showAutoBidControls(true);

  const logArea = document.getElementById('q-auto-log');
  logArea.style.display = 'block';
  logArea.innerHTML = '<div class="text-muted">내 입찰 현황 확인 중...</div>';

  function addAutoLog(msg, cls) {
    logArea.innerHTML += `<div class="${cls||''}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    logArea.scrollTop = logArea.scrollHeight;
  }

  // 1단계: 내 입찰 현황 수집 → 중복 필터링 → 자동 입찰 실행
  _fetchMyBidsAndFilter(bidList, addAutoLog).then(filteredItems => {
    if (!filteredItems || filteredItems.length === 0) {
      btn.disabled = false; btn.textContent = '자동 입찰 (Playwright)';
      showAutoBidControls(false);
      return;
    }

    btn.textContent = '자동 입찰 진행 중...';
    addAutoLog(`자동 입찰 시작: ${filteredItems.length}건`, 'log-info');

    fetch('/api/queue/auto-register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: filteredItems })
    }).then(r => r.json()).then(res => {
    if (res.error) {
      btn.disabled = false; btn.textContent = '자동 입찰 (Playwright)';
      showAutoBidControls(false);
      logArea.innerHTML = `<div style="color:var(--danger)">${res.error}</div>`;
      alert(res.error);
      return;
    }

    const poll = setInterval(() => {
      fetch('/api/task/' + res.taskId).then(r => r.json()).then(task => {
        if (task.logs) {
          logArea.innerHTML = task.logs.map(l => {
            const c = l.level === 'error' ? 'var(--danger)' : l.level === 'success' ? 'var(--accent)' : 'var(--text2)';
            return `<div style="color:${c}"><span style="color:var(--text3);font-size:11px">${l.time}</span> ${l.msg}</div>`;
          }).join('');
          logArea.scrollTop = logArea.scrollHeight;
        }
        if (task.status === 'done' || task.status === 'error') {
          clearInterval(poll);
          btn.disabled = false; btn.textContent = '자동 입찰 (Playwright)';
          showAutoBidControls(false);
          if (task.result) {
            const r = task.result;
            // 성공한 입찰 로컬 기록
            if (r.results) {
              r.results.forEach(res => {
                if (res.success) {
                  const key = `${res.productId}_${res.size}`;
                  const entry = { productId: res.productId, model: res.model||'', size: res.size,
                    price: res.price, date: new Date().toLocaleString('ko-KR'), source: 'placed' };
                  if (!myBidsMap[key]) myBidsMap[key] = [];
                  myBidsMap[key].push(entry);
                  myBidsLocal.bids.push(entry);
                }
              });
              updateSyncStatus();
              queueBuildResults();
            }
            alert(`자동 입찰 완료!\n성공: ${r.success}건 / 전체: ${r.total}건`);
            // batch 히스토리 새로고침
            loadBatchHistory();
          }
        }
      }).catch(() => { clearInterval(poll); btn.disabled = false; btn.textContent = '자동 입찰 (Playwright)'; showAutoBidControls(false); });
    }, 2000);
  }).catch(err => {
    btn.disabled = false; btn.textContent = '자동 입찰 (Playwright)';
    showAutoBidControls(false);
    alert('서버 연결 실패: ' + err.message);
  });
  }); // _fetchMyBidsAndFilter then 닫기
}

// 내 입찰 현황 수집 → 중복 필터링
async function _fetchMyBidsAndFilter(bidList, addLog) {
  addLog('내 입찰 현황 수집 중 (판매자센터)...', 'log-info');

  try {
    // /api/my-bids 호출 → 태스크 폴링
    const startRes = await fetch('/api/my-bids').then(r => r.json());
    if (!startRes.taskId) {
      addLog('⚠ 입찰 현황 수집 실패 — 중복 체크 없이 진행', 'log-warn');
      return bidList.map(b => ({
        productId: b.productId, model: b.model, size: b.size, price: b.price,
        quantity: b.qty, gosi: b.gosi, category: b.category,
        gosiAlready: b.gosiAlready, bid_days: b.bid_days || 30,
        cost: b.cost || 0, nameEn: b.nameEn || '',
      }));
    }

    // 폴링 대기 (최대 60초)
    let myBids = [];
    for (let t = 0; t < 30; t++) {
      await new Promise(r => setTimeout(r, 2000));
      const task = await fetch(`/api/task/${startRes.taskId}`).then(r => r.json());
      if (task.status === 'done' && task.result) {
        myBids = task.result.bids || [];
        break;
      } else if (task.status === 'error') {
        addLog('⚠ 입찰 현황 수집 실패 — 중복 체크 없이 진행', 'log-warn');
        return bidList.map(b => ({
          productId: b.productId, model: b.model, size: b.size, price: b.price,
          quantity: b.qty, gosi: b.gosi, category: b.category,
          gosiAlready: b.gosiAlready, bid_days: b.bid_days || 30,
          cost: b.cost || 0, nameEn: b.nameEn || '',
        }));
      }
    }

    addLog(`✓ 기존 입찰 ${myBids.length}건 확인`, 'log-success');

    // myBidsMap 업데이트 (대시보드 표시용) — 동기화 데이터로 교체
    myBidsLocal.bids = myBids.map(b => ({
      productId: String(b.productId), model: b.model || '', size: b.size || 'ONE SIZE',
      price: b.bidPrice, rank: b.bidRank || null,
      date: new Date().toLocaleString('ko-KR'), source: 'synced', orderId: b.orderId || '',
    }));
    myBidsRebuildMap();

    // 중복 체크: 같은 productId + size + 같은 가격이면 스킵, 가격 다르면 허용
    const filtered = [];
    let skipped = 0;
    bidList.forEach(b => {
      const existingBids = myBidsMap[`${b.productId}_${b.size || 'ONE SIZE'}`] || [];
      const samePriceBid = existingBids.find(e => e.price === b.price);
      if (samePriceBid) {
        addLog(`  ⏭ ${b.model} ${b.size}: 이미 동일가 ${b.price.toLocaleString()}원 입찰 중 → 스킵`, 'log-warn');
        skipped++;
      } else {
        if (existingBids.length > 0) {
          const oldPrices = existingBids.map(e => e.price.toLocaleString() + '원').join(', ');
          addLog(`  ✓ ${b.model} ${b.size}: 기존 ${oldPrices} → 새 ${b.price.toLocaleString()}원 추가 입찰`, 'log-success');
        }
        filtered.push({
          productId: b.productId, model: b.model, size: b.size, price: b.price,
          quantity: b.qty, gosi: b.gosi, category: b.category,
          gosiAlready: b.gosiAlready, bid_days: b.bid_days || 30,
          cost: b.cost || 0, nameEn: b.nameEn || '',
        });
      }
    });

    addLog(`기존 입찰 ${myBids.length}건, 동일가 ${skipped}건 스킵, 신규 ${filtered.length}건 입찰 진행`, 'log-info');

    if (filtered.length === 0) {
      addLog('모든 항목이 이미 입찰 중입니다. 추가 입찰 없음.', 'log-warn');
      alert('모든 항목이 이미 입찰 중입니다.');
      return null;
    }

    // 결과 테이블 새로고침 (myBidsMap 업데이트 반영)
    queueBuildResults();
    return filtered;

  } catch (e) {
    addLog(`⚠ 입찰 현황 확인 오류: ${e.message} — 중복 체크 없이 진행`, 'log-warn');
    return bidList.map(b => ({
      productId: b.productId, model: b.model, size: b.size, price: b.price,
      quantity: b.qty, gosi: b.gosi, category: b.category,
      gosiAlready: b.gosiAlready, bid_days: b.bid_days || 30,
      cost: b.cost || 0, nameEn: b.nameEn || '',
    }));
  }
}

// ═══ 엑셀 백업 업로드 → 결과 테이블 복원 ═══
function queueUploadBackupExcel(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.trim().split('\n');
    if (lines.length < 2) { alert('데이터가 없습니다'); return; }

    let header = lines[0].replace(/^\uFEFF/, '');
    const cols = header.split(',').map(c => c.trim());
    const find = (keywords) => cols.findIndex(c => keywords.some(k => c.includes(k)));
    const iModel = find(['모델번호', 'model']);
    const iName = find(['상품명', 'name']);
    const iCat = find(['카테고리', 'category']);
    const iSize = find(['사이즈', 'size']);
    const iCny = find(['CNY', 'cny']);
    const iCost = find(['원가', 'totalCost', 'KRW']);
    const iKream = find(['즉시구매', 'instantBuy', 'KREAM']);
    const iSell = find(['판매가', 'sell_price', '마진15%판매가']);
    const iProfit = find(['이익', 'profit', '마진15%이익']);
    const iBid = find(['입찰예정', 'bidPrice', '입찰예정가']);

    if (iModel === -1) { alert('모델번호 컬럼을 찾을 수 없습니다'); return; }

    const modelMap = {};
    for (let i = 1; i < lines.length; i++) {
      const vals = parseCSVLine(lines[i]);
      if (vals.length <= iModel) continue;
      const model = (vals[iModel] || '').trim();
      if (!model) continue;

      const name = iName >= 0 ? (vals[iName] || '').trim() : '';
      const cat = iCat >= 0 ? (vals[iCat] || '').trim() : '';
      const size = iSize >= 0 ? (vals[iSize] || '').trim() : '';
      const cny = iCny >= 0 ? parseFloat(vals[iCny]) || 0 : 0;
      const cost = iCost >= 0 ? parseFloat(vals[iCost]) || 0 : 0;
      const kreamPrice = iKream >= 0 ? parseInt(vals[iKream]) || 0 : 0;
      const sellPrice = iSell >= 0 ? parseInt(vals[iSell]) || 0 : 0;
      const profit = iProfit >= 0 ? parseInt(vals[iProfit]) || 0 : 0;
      const bidPrice = iBid >= 0 ? parseInt(vals[iBid]) || 0 : 0;

      if (!modelMap[model]) {
        modelMap[model] = { model, name, category: cat, kreamPrice, sizes: [], singleCost: 0, singleCny: 0, bidPrice: 0 };
      }

      if (size && size !== 'ONE SIZE') {
        modelMap[model].sizes.push({
          size, cny, totalCost: cost,
          margins: { margin_15: { sell_price: sellPrice, profit } },
          bidPrice
        });
      } else {
        modelMap[model].singleCost = cost;
        modelMap[model].singleCny = cny;
        modelMap[model].bidPrice = bidPrice;
        modelMap[model].singleMargins = { margin_15: { sell_price: sellPrice, profit } };
      }
    }

    const restored = [];
    let nextId = queueData.length > 0 ? Math.max(...queueData.map(q => q.id)) + 1 : 1;
    Object.values(modelMap).forEach(m => {
      const hasSizes = m.sizes.length > 0;
      const item = {
        id: nextId++,
        model: m.model,
        category: m.category || '미분류',
        shipping: 8000,
        quantity: 1,
        bid_days: 30,
        status: '완료',
        result: {
          nameKr: m.name,
          nameEn: '',
          productId: 0,
          instantBuyPrice: m.kreamPrice,
        }
      };

      if (hasSizes) {
        item.size = '전사이즈';
        item.sizes = m.sizes.map(sz => ({ size: sz.size, cny_price: sz.cny }));
        item.result.sizeMargins = m.sizes.map(sz => ({
          size: sz.size, cny: sz.cny, totalCost: sz.totalCost, margins: sz.margins
        }));
        item.bidPrice = { sizes: {} };
        m.sizes.forEach(sz => { if (sz.bidPrice) item.bidPrice.sizes[sz.size] = sz.bidPrice; });
      } else {
        item.size = 'ONE SIZE';
        item.cny = m.singleCny;
        item.result.totalCost = m.singleCost;
        item.result.margins = m.singleMargins || {};
        if (m.bidPrice) item.bidPrice = m.bidPrice;
      }

      restored.push(item);
    });

    if (restored.length === 0) { alert('복원할 데이터가 없습니다'); return; }

    restored.forEach(it => {
      queueData.push(it);
      // 입찰 예정가를 bidPrices 글로벌에 반영
      if (it.bidPrice) {
        if (typeof it.bidPrice === 'object' && it.bidPrice.sizes) {
          // 사이즈별 입찰가
          Object.entries(it.bidPrice.sizes).forEach(([sz, price]) => {
            if (price > 0) bidPrices[`${it.id}_${sz}`] = price;
          });
        } else if (typeof it.bidPrice === 'number' && it.bidPrice > 0) {
          // 단일 사이즈 입찰가
          bidPrices[it.id] = it.bidPrice;
        }
      }
    });
    queueRender();
    queueBuildResults();
    alert(`${file.name}에서 ${restored.length}건 결과 복원 완료`);
  };
  reader.readAsText(file, 'UTF-8');
}

// ═══ 엑셀/CSV 업로드로 큐 복원 ═══
function queueUploadExcel(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = ''; // 같은 파일 재선택 허용

  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = function(e) {
      const text = e.target.result;
      const items = parseCSVToQueueItems(text);
      if (items.length === 0) { alert('파싱 가능한 데이터가 없습니다'); return; }
      bulkAddToQueue(items, file.name);
    };
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'xlsx' || ext === 'xls') {
    // xlsx는 서버에서 파싱
    const formData = new FormData();
    formData.append('file', file);
    fetch('/api/queue/upload-excel', { method: 'POST', body: formData })
      .then(r => r.json())
      .then(res => {
        if (res.error) { alert(res.error); return; }
        const items = res.items || [];
        if (items.length === 0) { alert('파싱 가능한 데이터가 없습니다'); return; }
        // 서버에서 이미 큐에 추가됨
        queueData = res.queue || queueData;
        items.forEach(it => {
          if (!queueData.find(q => q.id === it.id)) queueData.push(it);
        });
        queueRender();
        alert(`${file.name}에서 ${items.length}건 추가됨`);
        triggerAutoExecIfEnabled();
      })
      .catch(err => alert('업로드 실패: ' + err.message));
  } else {
    alert('CSV 또는 XLSX 파일만 지원합니다');
  }
}

function parseCSVToQueueItems(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];

  // BOM 제거
  let header = lines[0].replace(/^\uFEFF/, '');
  const cols = header.split(',').map(c => c.trim());

  // 컬럼 인덱스 매핑 (유연하게)
  const find = (keywords) => cols.findIndex(c => keywords.some(k => c.includes(k)));
  const iModel = find(['모델', 'model', 'Model']);
  const iCategory = find(['카테고리', 'category', 'Category']);
  const iSize = find(['사이즈', 'size', 'Size']);
  const iCny = find(['CNY', 'cny', '중국가']);
  const iQty = find(['수량', 'qty', 'quantity', 'Quantity']);
  const iShipping = find(['배송비', 'shipping', 'Shipping']);
  const iBidDays = find(['만료', 'bid_days', '입찰기한']);

  if (iModel === -1) {
    alert('모델번호 컬럼을 찾을 수 없습니다.\n첫 행에 "모델번호" 또는 "model" 컬럼이 필요합니다.');
    return [];
  }

  // 모델번호별로 그룹핑 (같은 모델의 여러 사이즈 → sizes 배열)
  const modelMap = {};
  for (let i = 1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i]);
    if (vals.length <= iModel) continue;

    const model = (vals[iModel] || '').trim();
    if (!model) continue;

    const category = iCategory >= 0 ? (vals[iCategory] || '').trim() : '';
    const size = iSize >= 0 ? (vals[iSize] || '').trim() : '';
    const cny = iCny >= 0 ? parseFloat(vals[iCny]) || 0 : 0;
    const qty = iQty >= 0 ? parseInt(vals[iQty]) || 1 : 1;
    const shipping = iShipping >= 0 ? parseInt(vals[iShipping]) || 8000 : 8000;
    const bidDays = iBidDays >= 0 ? parseInt(vals[iBidDays]) || 30 : 30;

    if (!modelMap[model]) {
      modelMap[model] = { model, category, sizes: [], cny: 0, quantity: qty, shipping, bid_days: bidDays };
    }

    if (size && size !== 'ONE SIZE') {
      modelMap[model].sizes.push({ size, cny_price: cny });
    } else {
      modelMap[model].cny = cny;
    }
  }

  // items 배열로 변환
  return Object.values(modelMap).map(m => {
    const item = { model: m.model, category: m.category, quantity: m.quantity, shipping: m.shipping, bid_days: m.bid_days };
    if (m.sizes.length > 0) {
      item.sizes = m.sizes;
      item.size = '전사이즈';
    } else {
      item.cny = m.cny;
    }
    return item;
  });
}

function parseCSVLine(line) {
  // 간단한 CSV 파서 (쉼표 구분, 따옴표 처리)
  const result = [];
  let current = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuote) {
      if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuote = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuote = true; }
      else if (ch === ',') { result.push(current); current = ''; }
      else { current += ch; }
    }
  }
  result.push(current);
  return result;
}

function bulkAddToQueue(items, fileName) {
  fetch('/api/queue/bulk-add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ items })
  })
    .then(r => r.json())
    .then(res => {
      if (res.ok) {
        (res.items || []).forEach(it => queueData.push(it));
        queueRender();
        alert(`${fileName}에서 ${res.count}건 큐에 추가됨`);
        triggerAutoExecIfEnabled();
      } else {
        alert(res.error || '추가 실패');
      }
    })
    .catch(err => alert('서버 연결 실패: ' + err.message));
}

      const name = iName >= 0 ? (vals[iName] || '').trim() : '';
      const cat = iCat >= 0 ? (vals[iCat] || '').trim() : '';
      const size = iSize >= 0 ? (vals[iSize] || '').trim() : '';
      const cny = iCny >= 0 ? parseFloat(vals[iCny]) || 0 : 0;
      const cost = iCost >= 0 ? parseFloat(vals[iCost]) || 0 : 0;
      const kreamPrice = iKream >= 0 ? parseInt(vals[iKream]) || 0 : 0;
      const sellPrice = iSell >= 0 ? parseInt(vals[iSell]) || 0 : 0;
      const profit = iProfit >= 0 ? parseInt(vals[iProfit]) || 0 : 0;
      const bidPrice = iBid >= 0 ? parseInt(vals[iBid]) || 0 : 0;
      const qty = iQty >= 0 ? parseInt(vals[iQty]) || 1 : 1;
      const shipping = iShipping >= 0 ? parseInt(vals[iShipping]) || 8000 : 8000;
      const bidDays = iBidDays >= 0 ? parseInt(vals[iBidDays]) || 30 : 30;

      if (!modelMap[model]) {
        modelMap[model] = {
          model, name, category: cat, kreamPrice, sizes: [],
          singleCost: 0, singleCny: 0, bidPrice: 0,
          quantity: qty, shipping, bid_days: bidDays
        };
      }

      if (size && size !== 'ONE SIZE') {
        modelMap[model].sizes.push({
          size, cny, totalCost: cost,
          margins: sellPrice ? { margin_15: { sell_price: sellPrice, profit } } : {},
          bidPrice
        });
      } else {
        modelMap[model].singleCost = cost;
        modelMap[model].singleCny = cny;
        modelMap[model].bidPrice = bidPrice;
        if (sellPrice) {
          modelMap[model].singleMargins = { margin_15: { sell_price: sellPrice, profit } };
        }
      }
    }

    const restored = [];
    let nextId = queueData.length > 0 ? Math.max(...queueData.map(q => q.id)) + 1 : 1;

    Object.values(modelMap).forEach(m => {
      const hasSizes = m.sizes.length > 0;
      const item = {
        id: nextId++,
        model: m.model,
        category: m.category || '미분류',
        shipping: m.shipping,
        quantity: m.quantity,
        bid_days: m.bid_days,
        status: hasResultCols && (m.singleCost > 0 || m.sizes.some(s => s.totalCost > 0)) ? '완료' : '대기',
      };

      if (hasResultCols && item.status === '완료') {
        item.result = {
          nameKr: m.name, nameEn: '',
          productId: 0, instantBuyPrice: m.kreamPrice,
        };
      }

      if (hasSizes) {
        item.size = '전사이즈';
        item.sizes = m.sizes.map(sz => ({ size: sz.size, cny_price: sz.cny }));
        if (item.result) {
          item.result.sizeMargins = m.sizes.map(sz => ({
            size: sz.size, cny: sz.cny, totalCost: sz.totalCost, margins: sz.margins
          }));
          item.bidPrice = { sizes: {} };
          m.sizes.forEach(sz => { if (sz.bidPrice) item.bidPrice.sizes[sz.size] = sz.bidPrice; });
        }
      } else {
        item.size = 'ONE SIZE';
        item.cny = m.singleCny;
        if (item.result) {
          item.result.totalCost = m.singleCost;
          item.result.margins = m.singleMargins || {};
          if (m.bidPrice) item.bidPrice = m.bidPrice;
        }
      }

      restored.push(item);
    });

    if (restored.length === 0) { alert('복원할 데이터가 없습니다'); return; }

    // 결과 있는 항목은 클라이언트에서 바로 추가, 대기 항목은 서버에 bulk-add
    const withResult = restored.filter(r => r.status === '완료');
    const pending = restored.filter(r => r.status === '대기');

    withResult.forEach(it => queueData.push(it));

    if (pending.length > 0) {
      const bulkItems = pending.map(p => ({
        model: p.model, category: p.category, cny: p.cny,
        sizes: p.sizes, quantity: p.quantity, shipping: p.shipping, bid_days: p.bid_days
      }));
      fetch('/api/queue/bulk-add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: bulkItems })
      })
      .then(r => r.json())
      .then(res => {
        if (res.ok) {
          (res.items || []).forEach(it => queueData.push(it));
        }
        queueRender();
        if (withResult.length > 0) queueBuildResults();
        alert(`${file.name}에서 복원: 결과포함 ${withResult.length}건, 대기 ${pending.length}건`);
        triggerAutoExecIfEnabled();
      })
      .catch(err => {
        queueRender();
        if (withResult.length > 0) queueBuildResults();
        alert(`결과 ${withResult.length}건 복원됨 (서버 추가 실패: ${err.message})`);
      });
    } else {
      queueRender();
      queueBuildResults();
      alert(`${file.name}에서 ${withResult.length}건 결과 복원 완료`);
    }
  };
  reader.readAsText(file, 'UTF-8');
}


// ═══ 실행 이력에서 큐에 다시 추가 ═══
function reAddBatchToQueue(batchIdx) {
  const batch = batchHistoryData[batchIdx];
  if (!batch || !batch.items || batch.items.length === 0) {
    alert('복원할 항목이 없습니다');
    return;
  }

  const items = batch.items;
  const bulkItems = [];

  // 모델번호별로 그룹핑 (같은 모델의 여러 사이즈)
  const modelMap = {};
  items.forEach(item => {
    const model = (item.model || '').trim();
    if (!model) return;

    if (!modelMap[model]) {
      modelMap[model] = {
        model,
        category: '',
        sizes: [],
        cny: 0,
        quantity: 1,
        shipping: 8000,
        bid_days: 30,
        bid_price: item.bid_price || 0,
      };
    }

    const size = (item.size || '').trim();
    if (size && size !== 'ONE SIZE' && size !== '-') {
      modelMap[model].sizes.push({ size, cny_price: 0 });
    }
    // 입찰가 기록 (가장 최근 값 유지)
    if (item.bid_price) modelMap[model].bid_price = item.bid_price;
  });

  Object.values(modelMap).forEach(m => {
    const payload = {
      model: m.model,
      category: m.category,
      quantity: m.quantity,
      shipping: m.shipping,
      bid_days: m.bid_days,
    };
    if (m.sizes.length > 0) {
      payload.sizes = m.sizes;
    }
    bulkItems.push(payload);
  });

  if (bulkItems.length === 0) { alert('추가할 항목이 없습니다'); return; }

  fetch('/api/queue/bulk-add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ items: bulkItems })
  })
  .then(r => r.json())
  .then(res => {
    if (res.ok) {
      (res.items || []).forEach(it => queueData.push(it));
      queueRender();
      // 큐 탭으로 이동
      document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('tab-register').classList.add('active');
      document.querySelector('.nav-item').classList.add('active');
      document.getElementById('page-title').textContent = '상품 등록 / 입찰';
      alert(`${res.count}건이 큐에 추가되었습니다. KREAM 검색을 실행하세요.`);
      triggerAutoExecIfEnabled();
    } else {
      alert(res.error || '추가 실패');
    }
  })
  .catch(err => alert('서버 연결 실패: ' + err.message));
}

let autoExecEnabled = false;

function toggleAutoExec() {
  autoExecEnabled = document.getElementById('q-auto-exec-toggle').checked;
  if (autoExecEnabled) {
    // 미실행 항목이 있으면 즉시 실행
    const pending = queueData.filter(q => q.status === '대기' || q.status === '실패');
    if (pending.length > 0) {
      queueExecute();
    }
  }
}

// 큐 추가 후 자동 실행 트리거
function triggerAutoExecIfEnabled() {
  if (!autoExecEnabled) return;
  const btn = document.getElementById('q-exec-btn');
  if (btn.disabled) return; // 이미 실행 중
  const pending = queueData.filter(q => q.status === '대기' || q.status === '실패');
  if (pending.length > 0) {
    setTimeout(() => queueExecute(), 500);
  }
}

// ═══ 7단계: 입찰 관리 ═══
let mybidsData = [];

function mybidsLog(level, msg) {
  const log = document.getElementById('mybids-log');
  if (log.innerText === '대기 중...') log.innerHTML = '';
  const color = level === 'success' ? '#4CAF50' : level === 'error' ? '#f44' : '#aaa';
  log.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

function mybidsLoad() {
  const btn = document.getElementById('mybids-load-btn');
  btn.disabled = true; btn.textContent = '조회 중...';
  document.getElementById('mybids-status').textContent = '판매자센터에서 수집 중 (10~15초)';

  fetch('/api/my-bids').then(r => r.json()).then(res => {
    if (!res.taskId) { btn.disabled = false; btn.textContent = '입찰 목록 조회'; return; }
    pollTask(res.taskId, task => {
      btn.disabled = false; btn.textContent = '입찰 목록 조회';
      if (task.status === 'done' && task.result) {
        mybidsData = task.result.bids || [];
        mybidsRender();
        document.getElementById('mybids-status').textContent = `${mybidsData.length}건 조회 완료`;
      } else {
        document.getElementById('mybids-status').textContent = '조회 실패';
      }
    }, null);
  });
}

function mybidsRender() {
  const tbody = document.getElementById('mybids-tbody');
  if (mybidsData.length === 0) { tbody.innerHTML = '<tr><td colspan="9" class="text-muted">입찰 내역 없음</td></tr>'; return; }
  tbody.innerHTML = mybidsData.map(b => `<tr>
    <td><input type="checkbox" class="mybid-cb" data-oid="${b.orderId}"></td>
    <td style="font-size:11px">${b.orderId}</td>
    <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${b.nameKr || b.nameEn || '-'}</td>
    <td style="font-size:12px">${b.model || '-'}</td>
    <td>${b.size || '-'}</td>
    <td style="font-weight:600">${(b.bidPrice||0).toLocaleString()}원</td>
    <td>${b.bidRank || '-'}위</td>
    <td><span class="badge" style="background:var(--blue-light); color:var(--blue); font-size:11px">${b.saleType || '-'}</span></td>
    <td style="white-space:nowrap">
      <button class="btn" onclick="mybidsModify('${b.orderId}', ${b.bidPrice})" style="font-size:11px; padding:3px 8px">수정</button>
      <button class="btn" onclick="mybidsDelete('${b.orderId}')" style="font-size:11px; padding:3px 8px; color:var(--danger)">삭제</button>
    </td>
  </tr>`).join('');
}

function mybidsModify(orderId, currentPrice) {
  const newPrice = prompt(`새 입찰가 입력 (현재: ${currentPrice.toLocaleString()}원)\n\n기존 가격 이상만 입력 가능:`, currentPrice);
  if (!newPrice) return;
  const p = parseInt(newPrice);
  if (p < currentPrice) { alert('기존 입찰가보다 낮출 수 없습니다!'); return; }
  if (p === currentPrice) { alert('동일한 가격입니다'); return; }

  mybidsLog('info', `${orderId} → ${p.toLocaleString()}원 수정 중...`);
  fetch('/api/my-bids/modify', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({orderId, newPrice: p})
  }).then(r => r.json()).then(res => {
    if (res.taskId) pollTask(res.taskId, task => {
      mybidsLog(task.status === 'done' ? 'success' : 'error',
        task.status === 'done' ? '수정 완료' : '수정 실패');
    }, null);
  });
}

function mybidsDelete(orderId) {
  if (!confirm(`${orderId} 입찰을 삭제하시겠습니까?`)) return;
  mybidsLog('info', `${orderId} 삭제 중...`);
  fetch('/api/my-bids/delete', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({orderIds: [orderId]})
  }).then(r => r.json()).then(res => {
    if (res.taskId) pollTask(res.taskId, task => {
      mybidsLog(task.status === 'done' ? 'success' : 'error',
        task.status === 'done' ? '삭제 완료' : '삭제 실패');
      if (task.status === 'done') mybidsLoad();
    }, null);
  });
}

function mybidsDeleteSelected() {
  const checked = Array.from(document.querySelectorAll('.mybid-cb:checked'));
  if (checked.length === 0) { alert('삭제할 입찰을 선택하세요'); return; }
  const ids = checked.map(c => c.dataset.oid);
  if (!confirm(`${ids.length}건의 입찰을 삭제하시겠습니까?`)) return;

  mybidsLog('info', `${ids.length}건 삭제 시작...`);
  fetch('/api/my-bids/delete', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({orderIds: ids})
  }).then(r => r.json()).then(res => {
    if (res.taskId) pollTask(res.taskId, task => {
      mybidsLog(task.status === 'done' ? 'success' : 'error',
        task.status === 'done' ? `삭제 완료 (${task.result?.success || 0}건)` : '삭제 실패');
      if (task.status === 'done') mybidsLoad();
    }, null);
  });
}

  const info = document.getElementById('quick-product-info');
  info.style.display = 'block';

  if (k.model_number) document.getElementById('quick-model').value = k.model_number;

  const bidListHtml = (k.sell_bids || []).map(b =>
    `${b.price.toLocaleString()}원(${b.quantity || 1})`
  ).join(' / ');

  const sp = k.size_prices || [];
  let sizeHtml = '';
  if (sp.length > 1) {
    sizeHtml = '<div style="margin-top:6px; font-size:12px"><strong>사이즈별 즉시구매가:</strong><div style="display:flex; flex-wrap:wrap; gap:3px; margin-top:3px">' +
      sp.map(s => `<span style="background:${s.buyNowPrice ? '#e8f7ef' : '#f5f5f5'}; border-radius:4px; padding:2px 8px; font-size:11px">${s.size} <strong>${s.buyNowPrice ? s.buyNowPrice.toLocaleString() : '-'}</strong></span>`).join('') +
      '</div></div>';
  }

  info.innerHTML = `
    <div style="font-weight:600; margin-bottom:4px">${k.product_name || k.product_name_en}</div>
    <div style="display:flex; gap:16px; flex-wrap:wrap; font-size:12px">
      <span>즉시구매가: <strong style="color:var(--danger)">${k.instant_buy_price ? k.instant_buy_price.toLocaleString()+'원' : '-'}</strong></span>
      <span>즉시판매가: <strong style="color:var(--accent)">${k.instant_sell_price ? k.instant_sell_price.toLocaleString()+'원' : '-'}</strong></span>
      <span>최근거래가: <strong>${(k.recent_trade_price || k.display_price || 0).toLocaleString()}원</strong></span>
      <span>총거래: <strong>${k.total_trades || '-'}</strong></span>
    </div>
    ${bidListHtml ? '<div style="margin-top:4px; font-size:12px"><strong>판매입찰:</strong> ' + bidListHtml + '</div>' : ''}
    ${sizeHtml}
  `;

  // 배송타입 비교 테이블
  const sdp = k.size_delivery_prices || [];
  if (sdp.length > 0) {
    const hasData = sdp.some(s => s.buyFast || s.buyNormal || s.buyOverseas);
    if (hasData) {
      let tableHtml = '<div style="margin-top:10px; font-size:12px"><strong>사이즈별 배송타입 비교:</strong>';
      tableHtml += '<table style="margin-top:4px; font-size:11px; width:100%"><thead><tr><th>사이즈</th><th>빠른배송</th><th>일반배송</th><th>해외배송</th><th>해외 vs 일반</th></tr></thead><tbody>';
      for (const s of sdp) {
        if (!s.buyFast && !s.buyNormal && !s.buyOverseas) continue;
        const fmtP = v => v ? v.toLocaleString()+'원' : '-';
        let cmp = '-';
        if (s.buyOverseas && s.buyNormal) {
          const diff = s.buyOverseas - s.buyNormal;
          const pct = Math.round(diff / s.buyNormal * 100);
          if (diff < 0) cmp = `<span style="color:var(--accent); font-weight:600">${pct}%</span>`;
          else if (diff === 0) cmp = '<span style="color:var(--warning)">동일</span>';
          else cmp = `<span style="color:var(--danger)">+${pct}%</span>`;
        }
        tableHtml += `<tr><td style="font-weight:600">${s.size}</td><td>${fmtP(s.buyFast)}</td><td>${fmtP(s.buyNormal)}</td><td>${fmtP(s.buyOverseas)}</td><td>${cmp}</td></tr>`;
      }
      tableHtml += '</tbody></table></div>';
      info.innerHTML += tableHtml;
    }
  }

  // 즉시구매가 → 판매가에 자동 입력
  if (k.instant_buy_price) {
    document.getElementById('quick-sell').value = k.instant_buy_price;
  }
  quickCalc();
  document.getElementById('quick-search-status').textContent = '수집 완료!';
}

loadSettings();
loadHistory();

// ── 초기 탭(register) 동적 로드 ──
_loadTab('register', document.getElementById('tab-register'));

</script>
</body>
</html>
