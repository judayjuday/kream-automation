<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KREAM 판매자 대시보드</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  --bg: #fafafa;
  --card: #ffffff;
  --border: #e5e5e5;
  --text: #111111;
  --text2: #666666;
  --text3: #999999;
  --accent: #31b46e;
  --accent-light: #e8f7ef;
  --danger: #f15746;
  --danger-light: #fef0ee;
  --warning: #ff7500;
  --warning-light: #fff5eb;
  --blue: #297dcb;
  --blue-light: #edf4fc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

.app { display: flex; height: 100vh; }

/* 사이드바 */
.sidebar { width: 220px; background: #222; color: #fff; padding: 24px 0; flex-shrink: 0; overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-rate { margin-top: auto; padding: 10px 20px; border-top: 1px solid #333; font-size: 11px; color: #999; line-height: 1.5; }
.sidebar-logo { font-size: 20px; font-weight: 800; padding: 0 20px 24px; letter-spacing: -0.5px; }
.sidebar-logo span { color: var(--accent); }
.nav-group { margin-bottom: 8px; }
.nav-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; padding: 12px 20px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; transition: all 0.15s; font-size: 13px; color: #ccc; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(49,180,110,0.15); color: var(--accent); border-right: 3px solid var(--accent); }
.nav-icon { width: 18px; text-align: center; font-size: 15px; }

/* 메인 */
.main { flex: 1; overflow-y: auto; padding: 0; }
.header { padding: 20px 32px; border-bottom: 1px solid var(--border); background: var(--card); display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; font-weight: 700; }
.header-info { font-size: 12px; color: var(--text3); }

.content { padding: 24px 32px; }

/* 탭 */
.tab-view { display: none; }
.tab-view.active { display: block; }

/* 카드 */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-title .icon { font-size: 18px; }

/* 입력 폼 */
.form-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.form-label { font-size: 13px; color: var(--text2); min-width: 120px; font-weight: 500; }
.form-input { height: 38px; border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; font-size: 14px; font-family: inherit; outline: none; transition: border 0.15s; }
.form-input:focus { border-color: var(--accent); }
.form-input-sm { width: 120px; }
.form-input-md { width: 200px; }
.form-input-lg { width: 320px; }
.form-select { height: 38px; border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; font-size: 14px; font-family: inherit; background: #fff; cursor: pointer; }

/* 버튼 */
.btn { height: 38px; padding: 0 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #28a35e; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #d94a3b; }
.btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: #f5f5f5; }
.btn-sm { height: 32px; padding: 0 14px; font-size: 12px; }
.btn-lg { height: 44px; padding: 0 28px; font-size: 15px; }

/* 메트릭 카드 */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.metric { background: var(--bg); border-radius: 10px; padding: 16px; }
.metric-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.metric-green .metric-value { color: var(--accent); }
.metric-red .metric-value { color: var(--danger); }
.metric-blue .metric-value { color: var(--blue); }

/* 테이블 */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: center; padding: 10px 8px; background: var(--bg); color: var(--text2); font-weight: 600; font-size: 12px; border-bottom: 2px solid #222; white-space: nowrap; }
td { text-align: center; padding: 10px 8px; border-bottom: 1px solid var(--border); }
tr:hover td { background: #f9f9f9; }
tr.selected td { background: var(--accent-light); }

/* 배지 */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-good { background: var(--accent-light); color: var(--accent); }
.badge-ok { background: var(--warning-light); color: var(--warning); }
.badge-bad { background: var(--danger-light); color: var(--danger); }

/* 스텝 */
.steps { display: flex; gap: 0; margin-bottom: 24px; }
.step { flex: 1; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); text-align: center; font-size: 13px; font-weight: 600; color: var(--text3); position: relative; cursor: pointer; transition: all 0.15s; }
.step:first-child { border-radius: 10px 0 0 10px; }
.step:last-child { border-radius: 0 10px 10px 0; }
.step.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.step.done { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.step-num { font-size: 16px; font-weight: 800; display: block; }

/* 로그 */
.log-area { background: #1a1a1a; color: #ddd; border-radius: 10px; padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; max-height: 300px; overflow-y: auto; line-height: 1.8; user-select: text; -webkit-user-select: text; cursor: text; }
.log-success { color: var(--accent); }
.log-error { color: var(--danger); }
.log-info { color: var(--blue); }
.log-warn { color: var(--warning); }

/* 가격 선택 행 */
.price-row { cursor: pointer; transition: all 0.1s; }
.price-row:hover { background: var(--accent-light) !important; }
.price-row.selected { background: var(--accent-light) !important; }
.price-row.selected td:first-child { font-weight: 700; color: var(--accent); }

/* 반응형 */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .content { padding: 16px; }
  .metrics { grid-template-columns: 1fr 1fr; }
}

/* 기타 */
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.text-green { color: var(--accent); }
.text-red { color: var(--danger); }
.text-blue { color: var(--blue); }
.text-muted { color: var(--text3); }
.text-bold { font-weight: 700; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.flex { display: flex; align-items: center; gap: 8px; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
</style>
</head>
<body>
<div class="app">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-logo">KREAM <span>셀러</span></div>
    <div class="nav-group">
      <div class="nav-label">판매 관리</div>
      <div class="nav-item active" onclick="showTab('register')">

      </div>

      <div class="header-info"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="e2889786839b899087838fa2858f838b8ecc818d8f">[email&#160;protected]</a></div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
// ═══ 설정 ═══
let SETTINGS = {
  cnyRate: 218.12,
  usdRate: 1495.76,
  feeRate: 0.06,
  fixedFee: 2500,
  defaultShip: 8000,
  targetMargin: 15,
  undercutAmount: 1000,
  cnyMargin: 1.03,
  vatRate: 0.10,
  usdLimit: 150,
  tariffBag: 0.08,
  tariffShoe: 0.13,
};

let selectedPrice = 0;
let currentProduct = {};

// ═══ 탭 전환 (동적 로드) ═══
const _tabCache = {};  // id → HTML 캐시
const _tabLoaded = new Set();  // 로드 완료된 탭

function showTab(id) {
  document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const tabEl = document.getElementById('tab-' + id);
  tabEl.classList.add('active');
  if (event && event.currentTarget) event.currentTarget.classList.add('active');

  const titles = {
    register: '상품 등록 / 입찰',
    margin: '마진 계산기',
    bulk: '대량 등록',
    discover: '상품 발굴',
    adjust: '가격 자동 조정',
    prices: '가격 수집',
    mybids: '입찰 관리',
    history: '실행 이력',
    settings: '환율 / 수수료 설정'
  };
  document.getElementById('page-title').textContent = titles[id] || '';

  // 탭 HTML 동적 로드
  if (!_tabLoaded.has(id)) {
    _loadTab(id, tabEl);
  } else {
    _onTabShown(id);
  }
}

function _loadTab(id, tabEl) {
  if (_tabCache[id]) {
    tabEl.innerHTML = _tabCache[id];
    _tabLoaded.add(id);
    _onTabShown(id);
    return;
  }
  fetch(`/tabs/tab_${id}.html`)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(html => {
      // 외곽 div 태그 제거 (첫 줄: <div id="tab-xxx"...>, 마지막 줄: </div>)
      const lines = html.split('\n');
      // 첫 줄에서 <div id="tab-xxx" ...> 찾아서 제거
      let startIdx = 0, endIdx = lines.length;
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('id="tab-' + id + '"')) { startIdx = i + 1; break; }
      }
      // 마지막 </div> 제거
      for (let i = lines.length - 1; i >= 0; i--) {
        if (lines[i].trim() === '</div>') { endIdx = i; break; }
      }
      const innerHtml = lines.slice(startIdx, endIdx).join('\n');
      _tabCache[id] = innerHtml;
      tabEl.innerHTML = innerHtml;
      _tabLoaded.add(id);
      _onTabShown(id);
    })
    .catch(e => {
      tabEl.innerHTML = `<div style="color:var(--danger);padding:20px">탭 로드 실패: ${e.message}</div>`;
    });
}

function _onTabShown(id) {
  if (id === 'margin') { try { quickCalc(); } catch(e) {} }
  if (id === 'history') { try { loadBatchHistory(); loadSalesRecent(); loadSalesStats(); loadSalesSchedulerStatus(); loadRebidRecommendations(); } catch(e) {} }
  if (id === 'register' && typeof queueRender === 'function') {
    try {
      qSizeRows = [{ id: Date.now() + Math.random(), size: '', cny: '' }];
      qRenderSizeRows();
      queueRender();
      queueBuildResults();
    } catch(e) {}
  }
  if (id === 'settings') { try { loadSettings(); } catch(e) {} }
  if (id === 'adjust') { try { loadMonitorStatus(); loadPendingAdjustments(); loadAdjustHistory(); loadEmailPassword(); } catch(e) {} }
}

// ═══ 스텝 전환 ═══
function setStep(n) {
  for (let i = 1; i <= 4; i++) {
    document.getElementById('reg-step' + i).style.display = i === n ? 'block' : 'none';
    const step = document.getElementById('step' + i);
    step.className = 'step' + (i === n ? ' active' : (i < n ? ' done' : ''));
  }
}

function backStep1() { setStep(1); }
function goStep2() { calculateMargin(); setStep(2); }
function goStep3() { buildPriceTable(); setStep(3); }
function goStep4() { buildSummary(); setStep(4); }

// ═══ 마진 계산 핵심 ═══
function calcCost(cny, category, shipFee) {
  const rate = SETTINGS.cnyRate * SETTINGS.cnyMargin;
  const buyKRW = Math.round(cny * rate);
  const usdEquiv = Math.round(cny * SETTINGS.cnyRate / SETTINGS.usdRate * 100) / 100;
  const overLimit = usdEquiv > SETTINGS.usdLimit;
  const tariff = (category === '가방') ? SETTINGS.tariffBag : SETTINGS.tariffShoe;

  // 관부가세는 고객 부담 → 원가에서 제외, 참고용으로만 계산
  let customs = 0, importVat = 0;
  if (overLimit) {
    customs = Math.round(cny * SETTINGS.cnyRate * tariff);
    importVat = Math.round((cny * SETTINGS.cnyRate + customs) * SETTINGS.vatRate);
  }

  return {
    buyKRW, usdEquiv, overLimit, customs, importVat,
    totalCost: buyKRW + shipFee,  // 관부가세 제외
    shipFee, tariff, cny, rate
  };
}

function calcSettlement(sellPrice) {
  const commission = Math.round(sellPrice * SETTINGS.feeRate);
  const commVat = Math.round(commission * SETTINGS.vatRate);
  const totalFee = commission + commVat + SETTINGS.fixedFee;
  return {
    commission, commVat, fixedFee: SETTINGS.fixedFee,
    totalFee, settlement: sellPrice - totalFee
  };
}

function calcMargin(cost, settlement) {
  const margin = settlement - cost.totalCost;
  const marginRate = cost.totalCost > 0 ? Math.round(margin / cost.totalCost * 1000) / 10 : 0;
  return { margin, marginRate };
}

// ═══ 상품 검색 (Flask API 연결) ═══
function searchProduct() {
  const model = document.getElementById('reg-model').value.trim();
  const productId = document.getElementById('reg-product-id').value.trim();
  if (!model && !productId) { alert('모델번호 또는 상품번호를 입력하세요'); return; }

  const resultBox = document.getElementById('search-result');
  resultBox.style.display = 'block';
  resultBox.innerHTML = '<span style="color:var(--text2)">🔍 KREAM에서 실시간 검색 중... (20~30초 소요)</span>';

  const payload = productId ? { productId } : { model };

  fetch('/api/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    if (res.taskId) pollTask(res.taskId, onSearchResult, resultBox);
    else resultBox.innerHTML = '<span style="color:var(--danger)">API 오류</span>';
  })
  .catch(err => {
    resultBox.innerHTML = `<span style="color:var(--danger)">서버 연결 실패: ${err.message}</span>`;
  });
}

function pollTask(taskId, callback, statusEl) {
  const poll = setInterval(() => {
    fetch('/api/task/' + taskId)
    .then(r => r.json())
    .then(task => {
      if (task.status === 'done' || task.status === 'error') {
        clearInterval(poll);
        callback(task);
      } else if (statusEl && task.logs && task.logs.length > 0) {
        const last = task.logs[task.logs.length - 1];
        statusEl.innerHTML = `<span style="color:var(--text2)">🔄 ${last.msg}</span>`;
      }
    })
    .catch(() => clearInterval(poll));
  }, 1500);
}

function onSearchResult(task) {
  const resultBox = document.getElementById('search-result');

  // 세션 만료 감지
  if (task.result && task.result.kream && task.result.kream.session_expired) {
    const which = task.result.kream.session_expired === 'kream' ? 'KREAM 일반 사이트' : '판매자센터';
    resultBox.innerHTML = `<div style="color:var(--danger); font-weight:600; padding:12px; background:var(--danger-light); border-radius:8px">
      ⚠ 세션 만료! ${which} 재로그인이 필요합니다.<br>
      <span style="font-size:12px; font-weight:400">터미널: python3 kream_bot.py --mode ${task.result.kream.session_expired === 'kream' ? 'login-kream' : 'login'}</span>
    </div>`;
    return;
  }

  if (task.status === 'error' || !task.result) {
    const errMsg = task.logs && task.logs.length > 0
      ? task.logs[task.logs.length - 1].msg : '검색 실패';
    resultBox.innerHTML = `
      <div style="color:var(--warning)">⚠ ${errMsg}</div>
      <div style="color:var(--text2); font-size:12px; margin-top:4px">
        상품번호를 직접 입력한 후 다시 검색하세요.
      </div>
    `;
    return;
  }

  const kream = task.result.kream || {};
  const pid = kream.product_id || '';
  const brand = (kream.product_name_en || '').split(' ')[0] || '';

  document.getElementById('reg-product-id').value = pid;
  if (brand) document.getElementById('gosi-maker').value = brand;

  const bidList = (kream.sell_bids || []).map(b => ({p: b.price, q: b.quantity || 1}));

  currentProduct = {
    model: kream.model_number || document.getElementById('reg-model').value,
    productId: pid,
    name_en: kream.product_name_en || '',
    name_kr: kream.product_name || '',
    brand: brand,
    buyNow: kream.instant_buy_price || 0,
    sellNow: kream.instant_sell_price || 0,
    recent: kream.recent_trade_price || kream.display_price || 0,
    overseasBuy: 0,
    bidList: bidList
  };

  let bidListHtml = '';
  if (bidList.length > 0) {
    bidListHtml = '<div style="margin-top:8px"><strong>판매 입찰 현황:</strong> ';
    bidListHtml += bidList.map(b => `${b.p.toLocaleString()}원(${b.q})`).join(' / ');

function findBreakEven(totalCost) {
  for (let p = 20000; p <= 500000; p += 1000) {
    const s = calcSettlement(p);
    if (s.settlement >= totalCost) return p;
  }
  return 0;
}

// ═══ STEP3: 가격 테이블 ═══
function buildPriceTable() {
  const cny = parseFloat(document.getElementById('reg-cny').value) || 0;
  const cat = document.getElementById('reg-category').value;
  const ship = parseFloat(document.getElementById('reg-ship').value) || SETTINGS.defaultShip;
  const cost = calcCost(cny, cat, ship);
  
  const breakEven = findBreakEven(cost.totalCost);
  const target15 = findTargetPrice(cost.totalCost, SETTINGS.targetMargin);
  
  // 가격 범위 생성
  const prices = new Set();
  for (let p = Math.max(20000, breakEven - 5000); p <= target15 + 30000; p += 1000) {
    prices.add(p);
  }
  // 주요 포인트 추가
  [breakEven, target15, breakEven + 5000, target15 + 10000].forEach(p => prices.add(Math.round(p/1000)*1000));
  
  const sorted = [...prices].sort((a,b) => a - b);
  // 적절한 간격으로 필터
  const step = Math.max(1000, Math.round(sorted.length / 15) * 1000);
  const filtered = sorted.filter(p => p % step === 0 || p === breakEven || p === target15);
  
  let html = '';
  filtered.forEach(price => {
    const s = calcSettlement(price);
    const m = calcMargin(cost, s.settlement);
    
    let badgeClass = 'badge-bad';
    let badgeText = '비추';
    if (m.marginRate >= SETTINGS.targetMargin) { badgeClass = 'badge-good'; badgeText = '추천'; }
    else if (m.marginRate >= 5) { badgeClass = 'badge-ok'; badgeText = '보통'; }
    
    const isBreakEven = price === breakEven;
    const isTarget = price === target15;
    
    html += `<tr class="price-row" onclick="selectPrice(${price})" data-price="${price}">
      <td style="font-weight:600">${price.toLocaleString()}원 ${isBreakEven ? '<span class="text-red" style="font-size:11px">← 손익분기</span>' : ''} ${isTarget ? '<span class="text-green" style="font-size:11px">← 목표마진</span>' : ''}</td>
      <td>${s.totalFee.toLocaleString()}원</td>
      <td>${s.settlement.toLocaleString()}원</td>
      <td class="${m.margin >= 0 ? 'text-green' : 'text-red'}" style="font-weight:600">${m.margin >= 0 ? '+' : ''}${m.margin.toLocaleString()}원</td>
      <td class="${m.margin >= 0 ? 'text-green' : 'text-red'}">${m.marginRate}%</td>
      <td><span class="badge ${badgeClass}">${badgeText}</span></td>
    </tr>`;
  });
  
  document.getElementById('price-table-body').innerHTML = html;
  document.getElementById('selected-price-card').style.display = 'none';
}

function findTargetPrice(totalCost, targetRate) {
  for (let p = 20000; p <= 500000; p += 1000) {
    const s = calcSettlement(p);
    const margin = s.settlement - totalCost;
    if (totalCost > 0 && (margin / totalCost * 100) >= targetRate) return p;
  }
  return 0;
}

function selectPrice(price) {
  selectedPrice = price;

function executeRegister() {
  const log = document.getElementById('reg-log');
  const productId = document.getElementById('reg-product-id').value;
  const model = document.getElementById('reg-model').value;
  const gosiAlready = document.getElementById('gosi-already').checked;
  const size = document.getElementById('reg-size').value || 'ONE SIZE';
  const qty = parseInt(document.getElementById('reg-qty').value) || 1;
  const cat = document.getElementById('reg-category').value;

  if (!productId) { alert('상품번호를 입력하세요'); return; }
  if (!selectedPrice) { alert('판매가를 선택하세요'); return; }

  log.innerHTML = '';
  addLog(log, 'info', '🤖 KREAM 자동화 시작... (Playwright 실행 중)');

  const payload = {
    productId,
    price: selectedPrice,
    size,
    quantity: qty,
    gosiAlready,
    gosi: {
      category: cat === '신발' ? '신발' : '가방',
      type: document.getElementById('gosi-type').value || '',
      material: document.getElementById('gosi-material').value || '',
      color: document.getElementById('gosi-color').value || '',
      size: document.getElementById('gosi-size').value || '',
      maker: document.getElementById('gosi-maker').value || '',
      country: '상품별 상이 (케어라벨 참고)',
      warranty: '관련 법 및 소비자 분쟁 해결 기준에 따름',
      phone: '01075446127',
    }
  };

  fetch('/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    if (!res.taskId) { addLog(log, 'error', 'API 오류'); return; }
    // 태스크 폴링
    let lastLogIdx = 0;
    const poll = setInterval(() => {
      fetch('/api/task/' + res.taskId)
      .then(r => r.json())
      .then(task => {
        // 새 로그만 표시
        const newLogs = (task.logs || []).slice(lastLogIdx);
        newLogs.forEach(l => addLog(log, l.level, l.msg));
        lastLogIdx = (task.logs || []).length;

        if (task.status === 'done' || task.status === 'error') {
          clearInterval(poll);
          if (task.status === 'done' && task.result && task.result.success) {
            addLog(log, 'success', '🎉 모든 작업 완료!');
            addHistory(gosiAlready ? '입찰' : '고시+입찰', productId, model, selectedPrice);
            const regSize = size || 'ONE SIZE';
            const regEntry = { productId, model, size: regSize, price: selectedPrice, date: new Date().toLocaleString('ko-KR'), source: 'placed' };
            const regKey = `${productId}_${regSize}`;
            if (!myBidsMap[regKey]) myBidsMap[regKey] = [];
            myBidsMap[regKey].push(regEntry);
            myBidsLocal.bids.push(regEntry);
            updateSyncStatus();
          } else if (task.status === 'error') {
            addLog(log, 'error', '❌ 작업 실패');
          }
        }
      })
      .catch(() => clearInterval(poll));
    }, 2000);
  })
  .catch(err => {
    addLog(log, 'error', '서버 연결 실패: ' + err.message);
  });
}

function addLog(el, type, msg) {
  const line = document.createElement('div');
  line.className = 'log-' + type;
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

let salesCurrentPage = 0;
const SALES_PAGE_SIZE = 20;

function loadSalesRecent() {
  const offset = salesCurrentPage * SALES_PAGE_SIZE;
  fetch(`/api/sales/recent?limit=${SALES_PAGE_SIZE}&offset=${offset}`).then(r => r.json()).then(data => {
    if (!data.ok) return;
    const tbody = document.getElementById('sales-tbody');
    if (!data.sales || data.sales.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-muted">판매 데이터가 없습니다. 수동 동기화를 실행해주세요.</td></tr>';
      return;
    }
    let html = '';
    data.sales.forEach((s, i) => {
      html += `<tr>
        <td>${offset + i + 1}</td>
        <td style="font-size:11px">${s.order_id || '-'}</td>
        <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(s.product_info||'').replace(/"/g,'&quot;')}">${s.product_info || '-'}</td>
        <td><strong>${s.model || '-'}</strong></td>
        <td>${s.size || '-'}</td>
        <td style="font-weight:600">${s.sale_price ? s.sale_price.toLocaleString() + '원' : '-'}</td>
        <td style="font-size:12px">${s.trade_date || '-'}</td>
        <td style="font-size:12px">${s.ship_date || '-'}</td>
        <td><span style="color:var(--accent)">${s.ship_status || '-'}</span></td>
      </tr>`;
    });
    tbody.innerHTML = html;
    // 페이지 정보
    const totalPages = Math.ceil((data.total || 0) / SALES_PAGE_SIZE);
    document.getElementById('sales-page-info').textContent = `${salesCurrentPage+1}/${totalPages || 1} 페이지 (총 ${data.total}건)`;
    document.getElementById('sales-prev-btn').disabled = salesCurrentPage <= 0;
    document.getElementById('sales-next-btn').disabled = salesCurrentPage >= totalPages - 1;
  }).catch(() => {
    document.getElementById('sales-tbody').innerHTML = '<tr><td colspan="9" class="text-muted">판매 데이터를 불러올 수 없습니다</td></tr>';
  });

    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2)">`;

    html += `<span id="batch-arrow-${idx}" style="font-size:10px;color:var(--text3);transition:transform 0.2s;display:inline-block">&#9654;</span>`;
    html += `<span style="font-size:13px;font-weight:600">${dateStr}</span>`;
    html += typeBadge;
    html += `</div>`;
    html += `<div style="display:flex;align-items:center;gap:12px;font-size:13px">`;
    html += `<span>총 <strong>${batch.total}</strong>건</span>`;
    html += `<span style="color:var(--accent)">성공 <strong>${batch.success}</strong></span>`;
    if (batch.failed > 0) html += `<span style="color:var(--danger)">실패 <strong>${batch.failed}</strong></span>`;
    html += `<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();reAddBatchToQueue(${idx})" style="font-size:11px;padding:2px 10px;margin-left:4px">큐에 다시 추가</button>`;
    html += `</div></div>`;

    // 상세 테이블 (숨김)
    html += `<div id="batch-detail-${idx}" style="display:none;border-top:1px solid var(--border);padding:0">`;
    html += `<table style="font-size:12px;margin:0"><thead><tr>`;
    html += `<th style="padding:8px 12px">모델번호</th><th style="padding:8px 12px">상품명</th>`;
    if (batch.type === '자동입찰') {
      html += `<th style="padding:8px 12px">사이즈</th><th style="padding:8px 12px">입찰가</th>`;
    } else {
      html += `<th style="padding:8px 12px">원가</th><th style="padding:8px 12px">즉시구매가</th>`;
    }
    html += `<th style="padding:8px 12px">마진</th><th style="padding:8px 12px">상태</th></tr></thead><tbody>`;

    (batch.items || []).forEach(item => {
      const statusColor = (item.status||'').includes('완료') ? 'var(--accent)' :
        (item.status||'').includes('실패') ? 'var(--danger)' : 'var(--text2)';

function addHistory(type, productId, model, price) {
  // localStorage 기록은 유지하되 메인 UI는 batch 기반
  const now = new Date();
  const dateStr = now.getFullYear() + '/' +
    String(now.getMonth()+1).padStart(2,'0') + '/' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');
  let history = JSON.parse(localStorage.getItem('kream_history') || '[]');
  history.unshift({ date: dateStr, type, productId, model, price, success: 1, fail: 0 });

// ═══ 환율 자동 조회 ═══
function updateExchangeRateUI(cny, usd, updatedAt) {
  const rateText = document.getElementById('sidebar-rate-text');
  const rateTime = document.getElementById('sidebar-rate-time');
  const cnyInput = document.getElementById('set-cny-rate');
  const usdInput = document.getElementById('set-usd-rate');

function fetchExchangeRate(silent) {
  fetch('/api/exchange-rate')
    .then(r => r.json())
    .then(data => {
      const prevCny = SETTINGS.cnyRate;
      SETTINGS.cnyRate = parseFloat(data.cny) || SETTINGS.cnyRate;
      SETTINGS.usdRate = parseFloat(data.usd) || SETTINGS.usdRate;
      updateExchangeRateUI(SETTINGS.cnyRate, SETTINGS.usdRate, data.updated_at || '기본값');
      localStorage.setItem('kream_settings', JSON.stringify(SETTINGS));
      if (!silent && prevCny !== SETTINGS.cnyRate) recalcQueueCosts();
    })
    .catch(() => {
      // 서버 연결 실패 시 현재 SETTINGS 기본값으로 표시
      updateExchangeRateUI(SETTINGS.cnyRate, SETTINGS.usdRate, '오프라인');
    });
}

function refreshExchangeRate() {
  const btn = document.getElementById('btn-fetch-rate');
  const status = document.getElementById('rate-fetch-status');
  if (btn) btn.disabled = true;
  if (status) status.textContent = '조회 중...';

  fetch('/api/exchange-rate/refresh', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        const prevCny = SETTINGS.cnyRate;
        SETTINGS.cnyRate = parseFloat(data.cny) || SETTINGS.cnyRate;
        SETTINGS.usdRate = parseFloat(data.usd) || SETTINGS.usdRate;
        updateExchangeRateUI(data.cny, data.usd, data.updated_at);
        localStorage.setItem('kream_settings', JSON.stringify(SETTINGS));
        if (status) status.textContent = '업데이트 완료!';
        setTimeout(() => { if (status) status.textContent = ''; }, 3000);
        if (prevCny !== SETTINGS.cnyRate) recalcQueueCosts();
      } else {
        if (status) status.textContent = '조회 실패';
      }
    })
    .catch(() => { if (status) status.textContent = '오류 발생'; })
    .finally(() => { if (btn) btn.disabled = false; });
}

// 환율 변경 시 큐 내 완료 항목 원가 재계산
function recalcQueueCosts() {
  let changed = false;
  queueData.forEach(item => {
    if (!item.result) return;
    const r = item.result;
    const ship = item.shipping || SETTINGS.defaultShip;

    if (r.sizeMargins && r.sizeMargins.length > 0) {
      r.sizeMargins.forEach(sz => {
        const cost = calcCost(parseFloat(sz.cny) || 0, item.category, ship);
        sz.totalCost = cost.totalCost;
      });
      // 대표 totalCost = 최저 사이즈 기준
      const repCny = Math.min(...r.sizeMargins.map(s => parseFloat(s.cny) || 0));
      r.totalCost = calcCost(repCny, item.category, ship).totalCost;
    } else if (item.cny != null) {
      r.totalCost = calcCost(parseFloat(item.cny), item.category, ship).totalCost;
    }
    changed = true;
  });
  if (changed) queueBuildResults();
}

// ═══ 가격 자동 조정 (새 방식) ═══
let adjData = null;  // {bids, market, recommendations}

function adjLog(level, msg) {
  const log = document.getElementById('adj-log');
  if (log.innerText === '대기 중...') log.innerHTML = '';
  const color = level === 'success' ? '#4CAF50' : level === 'error' ? '#f44' : '#aaa';
  const ts = new Date().toLocaleTimeString();
  log.innerHTML += `<div style="color:${color}">[${ts}] ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

// ── 1~3단계: 스캔 ──
function adjScan() {
  const btn = document.getElementById('adj-scan-btn');
  const status = document.getElementById('adj-scan-status');
  btn.disabled = true;
  btn.textContent = '스캔 중...';
  status.textContent = '판매자센터에서 입찰 목록 수집 중 (30~60초 소요)';
  adjLog('info', '스캔 시작: 내 입찰 수집 → 시장 분석 → 제안 생성');

  fetch('/api/adjust/scan', {method: 'POST'})
  .then(r => r.json())
  .then(res => {
    if (!res.taskId) { adjLog('error', 'API 오류'); btn.disabled = false; btn.textContent = '내 입찰 스캔 + 시장 분석'; return; }

    let lastLogIdx = 0;
    const poll = setInterval(() => {
      fetch('/api/task/' + res.taskId).then(r => r.json()).then(task => {
        // 로그 표시
        (task.logs || []).slice(lastLogIdx).forEach(l => adjLog(l.level, l.msg));
        lastLogIdx = (task.logs || []).length;

        if (task.logs && task.logs.length > 0) {
          status.textContent = task.logs[task.logs.length - 1].msg;
        }

        if (task.status === 'done' || task.status === 'error') {
          clearInterval(poll);
          btn.disabled = false;
          btn.textContent = '내 입찰 스캔 + 시장 분석';

          if (task.status === 'done' && task.result) {
            adjData = task.result;
            renderAdjustResult();
            status.textContent = '스캔 완료!';
          } else {
            status.textContent = '스캔 실패';
          }
        }
      }).catch(() => { clearInterval(poll); btn.disabled = false; btn.textContent = '내 입찰 스캔 + 시장 분석'; });
    }, 2000);

// ── 5단계: 승인된 건만 실행 ──
function adjExecute() {
  if (!adjData || !adjData.recommendations) { alert('먼저 스캔을 실행하세요'); return; }

  const selected = [];
  document.querySelectorAll('.adj-cb:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.idx);
    const rec = adjData.recommendations[idx];
    if (rec && rec.action === 'raise') {
      selected.push({orderId: rec.orderId, newPrice: rec.recommendPrice});
    }
  });

  if (selected.length === 0) { alert('조정할 상품을 선택하세요'); return; }
  if (!confirm(`${selected.length}건의 입찰가를 수정합니다. 진행하시겠습니까?`)) return;

  adjLog('info', `일괄 조정 시작: ${selected.length}건`);

  fetch('/api/adjust/execute', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({items: selected})
  })
  .then(r => r.json())
  .then(res => {
    if (!res.taskId) { adjLog('error', 'API 오류'); return; }

    let lastLogIdx = 0;
    const poll = setInterval(() => {
      fetch('/api/task/' + res.taskId).then(r => r.json()).then(task => {
        (task.logs || []).slice(lastLogIdx).forEach(l => adjLog(l.level, l.msg));
        lastLogIdx = (task.logs || []).length;

        if (task.status === 'done' || task.status === 'error') {
          clearInterval(poll);
          if (task.result) {
            adjLog('success', `완료: ${task.result.success}/${task.result.total}건 성공`);
          }
        }
      }).catch(() => clearInterval(poll));
    }, 2000);
  })
  .catch(err => adjLog('error', '서버 연결 실패: ' + err.message));
}

function approveOne(id) {

}

function approveAllPending() {
  let ids = getSelectedPendingIds();

  _doApprove(ids);

function _doApprove(ids) {
  adjLog('info', `승인 실행: ${ids.length}건`);
  fetch('/api/adjust/approve', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ids})

  .then(r => r.json())
  .then(res => {
    if (!res.taskId) { adjLog('error', 'API 오류'); return; }
    let lastLogIdx = 0;
    const poll = setInterval(() => {
      fetch('/api/task/' + res.taskId).then(r => r.json()).then(task => {
        (task.logs || []).slice(lastLogIdx).forEach(l => adjLog(l.level, l.msg));
        lastLogIdx = (task.logs || []).length;
        if (task.status === 'done' || task.status === 'error') {
          clearInterval(poll);
          loadPendingAdjustments();
          loadAdjustHistory();
        }
      }).catch(() => clearInterval(poll));
    }, 2000);
  });
}

function rejectOne(id) {

    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ids: [id]})

// ═══ KREAM 키워드 검색 ═══
let kwResults = [];
let kwTags = [];

function kwAddTag() {
  const input = document.getElementById('kw-input');
  const val = input.value.trim();
  if (!val) return;
  if (kwTags.includes(val)) { input.value = ''; return; }
  kwTags.push(val);
  input.value = '';
  kwRenderTags();
}

function kwRemoveTag(idx) {
  kwTags.splice(idx, 1);
  kwRenderTags();
}

function kwRenderTags() {
  document.getElementById('kw-tags').innerHTML = kwTags.map((t, i) =>
    `<span style="display:inline-flex; align-items:center; gap:4px; background:var(--accent-light); color:var(--accent); border-radius:20px; padding:4px 12px; font-size:13px; font-weight:600">
      ${t}
      <span onclick="kwRemoveTag(${i})" style="cursor:pointer; font-size:15px; line-height:1; margin-left:2px; color:var(--text2)">&times;</span>
    </span>`
  ).join('');
}

function kwSearch() {
  if (kwTags.length === 0) { alert('키워드를 추가하세요'); return; }

  const btn = document.getElementById('kw-search-btn');
  btn.disabled = true; btn.textContent = '검색 중...';
  kwResults = [];
  kwRender();

  let idx = 0;
  function nextKeyword() {
    if (idx >= kwTags.length) {
      btn.disabled = false; btn.textContent = '검색';
      // 중복 제거
      const seen = new Set();
      kwResults = kwResults.filter(p => {
        if (seen.has(p.productId)) return false;
        seen.add(p.productId);
        return true;
      });
      kwRender();
      document.getElementById('kw-status').textContent =
        `${kwTags.length}개 키워드 → 총 ${kwResults.length}건 (중복 제거됨)`;
      return;
    }

    const kw = kwTags[idx]; idx++;
    document.getElementById('kw-status').textContent =
      `[${idx}/${kwTags.length}] "${kw}" 검색 중...`;

    fetch('/api/keyword-search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({keyword: kw, maxScroll: 3})
    })
    .then(r => r.json())
    .then(res => {
      if (!res.taskId) { nextKeyword(); return; }
      pollTask(res.taskId, task => {
        if (task.status === 'done' && task.result) {
          const prods = (task.result.products || []).map(p => ({...p, keyword: kw}));
          kwResults = kwResults.concat(prods);
          kwRender();
          document.getElementById('kw-status').textContent =
            `[${idx}/${kwTags.length}] "${kw}" → ${prods.length}건 (누적 ${kwResults.length}건)`;
        }
        setTimeout(nextKeyword, 1000);
      }, null);
    })
    .catch(() => setTimeout(nextKeyword, 500));
  }

  nextKeyword();
}

function kwRender() {
  const div = document.getElementById('kw-result');
  const tbody = document.getElementById('kw-tbody');
  div.hidden = false;

  if (kwResults.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-muted">결과 없음</td></tr>';
    return;
  }

  tbody.innerHTML = kwResults.map((p, i) => `<tr>
    <td><input type="checkbox" class="kw-cb" data-idx="${i}" data-pid="${p.productId}"></td>
    <td><span style="background:var(--blue-light); color:var(--blue); border-radius:10px; padding:2px 8px; font-size:11px">${p.keyword || '-'}</span></td>
    <td>${p.brand}</td>
    <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" title="${p.nameKr}">${p.nameKr}</td>
    <td style="font-size:12px; color:var(--text2); font-family:monospace">${p.model || '<span style="color:var(--text3)">-</span>'}</td>
    <td style="font-weight:600">${p.price ? p.price.toLocaleString()+'원' : '-'}</td>
    <td style="font-size:12px">${p.trades ? p.trades.toLocaleString() : '-'}</td>
    <td>${p.productId}</td>
    <td style="white-space:nowrap">
      <button class="btn" onclick="discSearch('${p.productId}')" style="font-size:11px; padding:3px 8px; margin-right:3px" title="가격 수집">🔍</button>
      <button class="btn btn-accent" onclick="discGoBid('${p.productId}','${(p.model||'').replace(/'/g,'')}')" style="font-size:11px; padding:3px 8px" title="입찰하기">💰</button>
    </td>
  </tr>`).join('');
}

function kwBulkPrice() {
  const checked = Array.from(document.querySelectorAll('.kw-cb:checked'));
  if (checked.length === 0) { alert('상품을 선택하세요'); return; }
  const pids = checked.map(c => c.dataset.pid);
  document.getElementById('kw-status').textContent = `${pids.length}건 일괄 가격 수집 중...`;

  let idx = 0;
  function next() {
    if (idx >= pids.length) {
      document.getElementById('kw-status').textContent = `${pids.length}건 수집 완료`;
      return;
    }
    const pid = pids[idx]; idx++;
    document.getElementById('kw-status').textContent = `[${idx}/${pids.length}] #${pid} 수집 중...`;

    fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({productId: pid})
    })
    .then(r => r.json())
    .then(res => {
      if (!res.taskId) { next(); return; }
      pollTask(res.taskId, task => {
        if (task.status === 'done' && task.result && task.result.kream) {
          const k = task.result.kream;
          // kwResults 업데이트
          const item = kwResults.find(x => x.productId === pid);
          if (item) {
            item.instantBuy = k.instant_buy_price;
            item.instantSell = k.instant_sell_price;
            item.recentTrade = k.recent_trade_price || k.display_price;
            item.sellBids = k.sell_bids;
            item.buyBids = k.buy_bids;
            item.sizePrices = k.size_prices || [];
            item.priceCollected = true;
          }
          kwRenderUpdated();
        }
        setTimeout(next, 1000);
      }, null);
    })
    .catch(() => setTimeout(next, 500));
  }
  next();
}

function kwRenderUpdated() {
  kwResults.forEach((p, i) => {
    if (!p.priceCollected) return;
    const row = document.querySelector(`.kw-cb[data-idx="${i}"]`);
    if (!row) return;
    const tr = row.closest('tr');
    if (!tr) return;
    const cells = tr.querySelectorAll('td');
    if (cells.length < 7) return;
    // 표시가 컬럼 (idx=5)에 상세 가격 추가
    cells[5].innerHTML = `
      <div style="font-weight:600">${p.price ? p.price.toLocaleString()+'원' : '-'}</div>
      <div style="font-size:11px; color:var(--accent)">구매 ${p.instantBuy ? p.instantBuy.toLocaleString() : '-'}</div>
      <div style="font-size:11px; color:var(--danger)">판매 ${p.instantSell ? p.instantSell.toLocaleString() : '-'}</div>
    `;
    // 사이즈별 가격 (있으면 행 아래 펼치기)
    if (p.sizePrices && p.sizePrices.length > 1) {
      let existing = tr.nextElementSibling;
      if (existing && existing.classList.contains('kw-size-row')) existing.remove();
      const sizeRow = document.createElement('tr');
      sizeRow.className = 'kw-size-row';
      const sizeHtml = p.sizePrices.map(s =>
        `<span style="display:inline-block; background:${s.buyNowPrice ? 'var(--accent-light)' : '#f5f5f5'}; border-radius:4px; padding:2px 6px; margin:1px; font-size:11px">${s.size} <strong>${s.buyNowPrice ? s.buyNowPrice.toLocaleString() : '-'}</strong></span>`
      ).join('');
      sizeRow.innerHTML = `<td colspan="9" style="padding:4px 8px 8px 40px; background:#fafafa; font-size:11px"><strong>사이즈별:</strong> ${sizeHtml}</td>`;
      tr.after(sizeRow);
    }
  });
}

// ═══ 자동 상품 발굴 ═══
let autoscanData = [];

function autoScan() {
  const category = document.getElementById('autoscan-category').value;
  const btn = document.getElementById('autoscan-btn');
  const statusEl = document.getElementById('autoscan-status');
  btn.disabled = true;
  btn.textContent = '스캔 중...';
  statusEl.style.display = 'block';
  statusEl.textContent = '키워드 검색 시작...';

  fetch('/api/discovery/auto-scan', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({category})
  }).then(r => r.json()).then(data => {
    if (!data.taskId) {
      btn.disabled = false; btn.textContent = '자동 스캔 시작';
      statusEl.textContent = '오류: ' + (data.error || '');
      return;
    }
    // 폴링
    const poll = setInterval(() => {
      fetch(`/api/task/${data.taskId}`).then(r => r.json()).then(t => {
        if (t.logs && t.logs.length > 0) {
          statusEl.textContent = t.logs[t.logs.length - 1].msg || '';
        }
        if (t.status === 'done' || t.status === 'error') {
          clearInterval(poll);
          btn.disabled = false; btn.textContent = '자동 스캔 시작';
          if (t.status === 'error') {
            statusEl.textContent = '오류: ' + (t.error || '');
            return;
          }
          const result = t.result || {};
          autoscanData = result.products || [];
          statusEl.textContent = `스캔 완료: 총 ${result.total_scanned || 0}건 발견, 상위 ${autoscanData.length}건 표시`;
          renderAutoscan();
        }
      });
    }, 2000);
  }).catch(e => {
    btn.disabled = false; btn.textContent = '자동 스캔 시작';
    statusEl.textContent = '요청 실패: ' + e;
  });
}

function renderAutoscan() {
  const tbody = document.getElementById('autoscan-tbody');
  if (!autoscanData.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="text-muted">결과 없음</td></tr>';
    return;
  }
  let html = '';
  autoscanData.forEach((p, i) => {
    const scoreColor = p.score >= 70 ? 'var(--accent)' : p.score >= 40 ? 'var(--warning)' : 'var(--text3)';
    html += `<tr>
      <td><input type="checkbox" class="autoscan-cb" data-idx="${i}"></td>
      <td style="font-weight:700;color:${scoreColor}">${p.score || 0}</td>
      <td style="font-size:12px">${p.brand || '-'}</td>
      <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(p.nameKr||'').replace(/"/g,'&quot;')}">${p.nameKr || p.nameEn || '-'}</td>
      <td><strong>${p.model || '-'}</strong></td>
      <td>${p.price ? p.price.toLocaleString() + '원' : '-'}</td>
      <td>${p.trades ? p.trades.toLocaleString() : '-'}</td>
      <td style="font-size:11px">${p.search_keyword || '-'}</td>
      <td style="font-size:11px">${p.score >= 70 ? '추천' : p.score >= 40 ? '보통' : '낮음'}</td>
      <td>${p.model ? `<button class="btn btn-outline btn-sm" onclick="autoscanAddOne(${i})">큐추가</button>` : '-'}</td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function autoscanAddOne(idx) {
  const p = autoscanData[idx];
  if (!p || !p.model) return;
  fetch('/api/queue', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ model: p.model, sizes: [], bid_strategy: 'undercut', quantity: 1 })
  }).then(r => r.json()).then(d => {
    if (d.ok) alert(`${p.model} 큐에 추가 완료`);
    else alert('추가 실패: ' + (d.error || ''));
  });
}

function autoscanAddToQueue() {
  const checked = document.querySelectorAll('.autoscan-cb:checked');
  if (!checked.length) { alert('선택된 항목이 없습니다'); return; }
  let added = 0;
  const promises = [];
  checked.forEach(cb => {
    const p = autoscanData[parseInt(cb.dataset.idx)];
    if (!p || !p.model) return;
    promises.push(
      fetch('/api/queue', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ model: p.model, sizes: [], bid_strategy: 'undercut', quantity: 1 })
      }).then(r => r.json()).then(d => { if (d.ok) added++; })
    );
  });
  Promise.all(promises).then(() => alert(`${added}건 큐에 추가 완료`));
}

function discRender() {
  if (!discData) return;
  const catFilter = document.getElementById('disc-cat-filter').value.toLowerCase();
  const search = document.getElementById('disc-search').value.toLowerCase();
  const thead = document.getElementById('disc-thead');
  const tbody = document.getElementById('disc-tbody');

  let items = [];
  let headers = '';

  if (discTab === 'overseas') {
    items = discData.overseas_top100 || [];
    headers = '<tr><th>순위</th><th>브랜드</th><th>상품명</th><th>모델번호</th><th>카테고리</th><th>상품ID</th><th>액션</th></tr>';
  } else if (discTab === 'surge') {
    items = discData.search_surge || [];
    headers = '<tr><th>급등률</th><th>브랜드</th><th>상품명</th><th>모델번호</th><th>카테고리</th><th>상품ID</th><th>액션</th></tr>';
  } else {
    items = discData.brand_top100 || [];
    headers = '<tr><th>브랜드</th><th>상품명</th><th>상품ID</th><th>액션</th></tr>';
  }
  thead.innerHTML = headers;

  // 필터
  let filtered = items;
  if (catFilter) {
    filtered = filtered.filter(x => (x.category || '').toLowerCase().includes(catFilter));
  }
  if (search) {
    filtered = filtered.filter(x =>
      (x.brand || '').toLowerCase().includes(search) ||
      (x.name || '').toLowerCase().includes(search) ||
      (x.model || '').toLowerCase().includes(search) ||
      (x.productId || '').includes(search)
    );
  }

  // 정렬
  if (discTab === 'overseas') filtered.sort((a,b) => (a.rank||999) - (b.rank||999));
  else if (discTab === 'surge') filtered.sort((a,b) => (b.surge||0) - (a.surge||0));

  // 최대 200건
  const show = filtered.slice(0, 200);

  let html = '';
  show.forEach(item => {
    const pid = item.productId;
    const actionBtns = `
      <button class="btn" onclick="discSearch('${pid}')" style="font-size:11px; padding:3px 8px; margin-right:4px" title="가격 조회">🔍 가격</button>
      <button class="btn btn-accent" onclick="discGoBid('${pid}','${(item.model||'').replace(/'/g,'')}')" style="font-size:11px; padding:3px 8px" title="입찰하기">💰 입찰</button>
    `;

    if (discTab === 'overseas') {
      html += `<tr>
        <td style="font-weight:700; color:var(--accent)">${item.rank || '-'}</td>
        <td>${item.brand}</td>
        <td style="max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${item.name}</td>
        <td style="font-size:12px; color:var(--text2)">${item.model || '-'}</td>
        <td style="font-size:12px">${item.category || '-'}</td>
        <td>${pid}</td>
        <td style="white-space:nowrap">${actionBtns}</td>
      </tr>`;
    } else if (discTab === 'surge') {
      const surgeVal = item.surge || 0;
      const surgeColor = surgeVal >= 200 ? 'var(--danger)' : surgeVal >= 100 ? 'var(--warning)' : 'var(--text)';
      html += `<tr>
        <td style="font-weight:700; color:${surgeColor}">${surgeVal}%</td>
        <td>${item.brand}</td>
        <td style="max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${item.name}</td>
        <td style="font-size:12px; color:var(--text2)">${item.model || '-'}</td>
        <td style="font-size:12px">${item.category || '-'}</td>
        <td>${pid}</td>
        <td style="white-space:nowrap">${actionBtns}</td>
      </tr>`;
    } else {
      html += `<tr>
        <td>${item.brand}</td>
        <td style="max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${item.name}</td>
        <td>${pid}</td>
        <td style="white-space:nowrap">${actionBtns}</td>
      </tr>`;
    }
  });

  tbody.innerHTML = html || '<tr><td colspan="8" class="text-muted">결과 없음</td></tr>';
  document.getElementById('disc-status').textContent = `${filtered.length}건 중 ${show.length}건 표시`;
}

// ═══ 내 입찰 현황 ═══
let myBidsLocal = { bids: [], lastSync: null };
let myBidsMap = {};  // key: `${productId}_${size}` → [bid, bid, ...] (복수 입찰 지원)

function myBidsRebuildMap() {
  myBidsMap = {};
  (myBidsLocal.bids || []).forEach(b => {
    const key = `${b.productId}_${b.size}`;
    if (!myBidsMap[key]) myBidsMap[key] = [];
    myBidsMap[key].push(b);
  });
}

// 내 입찰 셀 HTML 렌더링 (순위 포함)
function renderMyBidCell(productId, size) {
  const key = `${productId}_${size}`;
  const entries = myBidsMap[key];
  if (!entries || entries.length === 0) return '<span class="text-muted">-</span>';
  return entries.map(e => {
    const rankText = e.rank ? ` (${e.rank}위)` : '';
    const isFirst = e.rank === 1;
    const bg = isFirst ? 'background:#e6f9e6;' : e.rank ? 'background:#fff3e0;' : '';
    const color = isFirst ? 'color:#1a7a1a' : e.rank ? 'color:#e65100' : 'color:var(--blue)';
    return `<span style="display:inline-block;padding:1px 5px;border-radius:4px;font-weight:700;font-size:11px;${bg}${color}">${e.price.toLocaleString()}원${rankText}</span>`;
  }).join('<br>');
}

// 경쟁력 분석 툴팁/배지 렌더링
function renderCompBadge(comp) {
  if (!comp || !comp.competitiveness) return '';
  const cMap = {green:'#e6f9e6;color:#1a7a1a', yellow:'#fff8e0;color:#8a6d00', red:'#ffe6e6;color:#cc0000'};
  const bg = cMap[comp.comp_color] || cMap.green;
  const domLabel = comp.domestic_min ? `국내${comp.domestic_min.toLocaleString()}` : '국내없음';
  const diff = comp.diff_vs_domestic ? (comp.diff_vs_domestic > 0 ? '+' : '') + comp.diff_vs_domestic.toLocaleString() + '원' : '';
  const tip = `국내최저: ${comp.domestic_min ? comp.domestic_min.toLocaleString()+'원' : '없음'}\\n해외최저: ${comp.overseas_min ? comp.overseas_min.toLocaleString()+'원' : '없음'}\\n고객총액: ${comp.customer_total ? comp.customer_total.toLocaleString()+'원' : '-'}\\n(입찰가+배송3,000+관부가세${comp.customer_customs ? comp.customer_customs.toLocaleString() : '0'}+${comp.customer_vat ? comp.customer_vat.toLocaleString() : '0'})\\n국내대비: ${diff} (${comp.diff_pct||0}%)`;
  return `<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;background:${bg};cursor:help;white-space:nowrap" title="${tip}">${comp.competitiveness}</span>`;
}

// 경쟁력 상세 행 (사이즈별 테이블 아래 표시)
function renderCompDetail(comp) {
  if (!comp || !comp.competitiveness) return '';
  const parts = [];
  if (comp.domestic_min) parts.push(`국내 <b>${comp.domestic_min.toLocaleString()}</b>`);
  else parts.push(`<span style="color:#1a7a1a">국내없음</span>`);
  if (comp.overseas_min) parts.push(`해외 <b>${comp.overseas_min.toLocaleString()}</b>`);
  parts.push(`고객총액 <b>${(comp.customer_total||0).toLocaleString()}</b>`);
  if (comp.domestic_min && comp.diff_vs_domestic !== 0) {
    const d = comp.diff_vs_domestic;
    const c = d <= 0 ? '#1a7a1a' : d / comp.domestic_min <= 0.2 ? '#8a6d00' : '#cc0000';
    parts.push(`<span style="color:${c}">${d>0?'+':''}${d.toLocaleString()} (${comp.diff_pct}%)</span>`);
  }
  return `<span style="font-size:10px;color:var(--text3)">${parts.join(' | ')}</span>`;
}

function loadMyBidsLocal() {
  fetch('/api/my-bids/local').then(r => r.json()).then(data => {
    myBidsLocal = data;
    myBidsRebuildMap();
    updateSyncStatus();
  }).catch(() => {});
}

function updateSyncStatus() {
  const el = document.getElementById('sync-bids-status');
  if (!el) return;
  if (myBidsLocal.lastSync) {
    el.textContent = `마지막 동기화: ${myBidsLocal.lastSync} (${(myBidsLocal.bids||[]).length}건)`;
    el.style.color = 'var(--accent)';
  } else {
    el.textContent = (myBidsLocal.bids||[]).length > 0
      ? `로컬 기록 ${myBidsLocal.bids.length}건`
      : '동기화 안 됨';
    el.style.color = 'var(--text3)';
  }
}

function syncMyBids() {
  const btn = document.getElementById('sync-bids-btn');
  const status = document.getElementById('sync-bids-status');
  btn.disabled = true;
  btn.textContent = '동기화 중...';
  status.textContent = '판매자센터 접속 중... (30~60초 소요)';
  status.style.color = 'var(--text2)';

  fetch('/api/my-bids/sync', { method: 'POST' })
  .then(r => r.json())
  .then(res => {
    if (!res.taskId) {
      btn.disabled = false; btn.textContent = '내 입찰 현황 동기화 🔄';
      status.textContent = '오류 발생'; status.style.color = 'var(--danger)';
      return;
    }
    const poll = setInterval(() => {
      fetch('/api/task/' + res.taskId).then(r => r.json()).then(task => {
        if (task.logs && task.logs.length > 0)
          status.textContent = task.logs[task.logs.length - 1].msg;
        if (task.status === 'done' || task.status === 'error') {
          clearInterval(poll);
          btn.disabled = false; btn.textContent = '내 입찰 현황 동기화 🔄';
          if (task.status === 'done' && task.result) {
            myBidsLocal = task.result;
            myBidsRebuildMap();
            updateSyncStatus();
            queueBuildResults();
          } else {
            status.textContent = '동기화 실패'; status.style.color = 'var(--danger)';
          }
        }
      }).catch(() => {
        clearInterval(poll);
        btn.disabled = false; btn.textContent = '내 입찰 현황 동기화 🔄';
      });
    }, 2000);
  })
  .catch(() => {
    btn.disabled = false; btn.textContent = '내 입찰 현황 동기화 🔄';
    status.textContent = '서버 연결 실패'; status.style.color = 'var(--danger)';
  });
}

      a.download = 'kream_queue_template.xlsx';
      a.click();
      URL.revokeObjectURL(a.href);
    })
    .catch(err => alert(err.message));
}

let queueData = [];
let qSizeRows = [];
let qModalItemId = null;

const KR_SIZES = ['220','225','230','235','240','245','250','255','260','265','270','275','280','285','290','295','300'];

// ── 사이즈 입력 여부에 따라 카테고리·CNY 표시 자동 전환 ──

function qAddSizeRow(sz, cny) {

const CLOTHING_SIZES = ['XS','S','M','L','XL','XXL','XXXL','XXXXL'];
const CLOTHING_ALIASES = {'2XL':'XXL','3XL':'XXXL','4XL':'XXXXL'};

function _expandSizeRange(sizeStr, cny) {
  sizeStr = sizeStr.trim();
  if (!sizeStr) return [];

  // 콤마 구분: S,M,L,XL
  if (sizeStr.includes(',')) {
    return sizeStr.split(',').map(s => s.trim()).filter(s => s).map(s => ({ size: s, cny_price: cny }));
  }

  // 범위: "X-Y" or "X~Y"
  const rangeMatch = sizeStr.match(/^(.+?)\s*[-~]\s*(.+)$/);
  if (rangeMatch) {
    const fromRaw = rangeMatch[1].trim().toUpperCase();
    const toRaw = rangeMatch[2].trim().toUpperCase();

    // 숫자 범위 (신발): 215-255
    if (/^\d{2,3}$/.test(fromRaw) && /^\d{2,3}$/.test(toRaw)) {
      const from = parseInt(fromRaw), to = parseInt(toRaw);
      if (from > to || from < 100 || to > 400) return [{ size: sizeStr, cny_price: cny }];
      const sizes = [];
      for (let s = from; s <= to; s += 5) sizes.push({ size: String(s), cny_price: cny });
      return sizes;
    }

    // 의류 사이즈 범위: S-XL, M-XXL, S-3XL
    const fromKey = CLOTHING_ALIASES[fromRaw] || fromRaw;
    const toKey = CLOTHING_ALIASES[toRaw] || toRaw;
    const fi = CLOTHING_SIZES.indexOf(fromKey);
    const ti = CLOTHING_SIZES.indexOf(toKey);
    if (fi >= 0 && ti >= 0 && fi <= ti) {
      return CLOTHING_SIZES.slice(fi, ti + 1).map(s => ({ size: s, cny_price: cny }));
    }
  }

  // 단일
  return [{ size: sizeStr, cny_price: cny }];
}

function qBuildSizesFromInput() {
  if (document.getElementById('q-same-price').checked) {
    const cny = parseFloat(document.getElementById('q-same-cny').value);
    const from = document.getElementById('q-same-from').value.trim();
    const to = document.getElementById('q-same-to').value.trim();
    if (!cny || !from || !to) return null;
    // 범위 확장 지원
    const rangeStr = `${from}-${to}`;
    const expanded = _expandSizeRange(rangeStr, cny);
    if (expanded.length === 0) {
      // 폴백: KR_SIZES 풀에서 검색
      const pool = KR_SIZES;
      const fi = pool.indexOf(from), ti = pool.indexOf(to);
      if (fi < 0 || ti < 0 || fi > ti) return null;
      return pool.slice(fi, ti + 1).map(s => ({ size: s, cny_price: cny }));
    }
    return expanded;
  }
  // 개별 입력
  // DOM에서 최신 값 읽기
  document.querySelectorAll('#q-sizes-tbody input').forEach(el => {
    const rid = parseFloat(el.dataset.rid);
    const field = el.dataset.field;
    const row = qSizeRows.find(r => r.id === rid);
    if (row) row[field] = field === 'cny' ? parseFloat(el.value) || '' : el.value;
  });
  // 사이즈 범위 확장 지원 (개별 행에서도 "215-255" 입력 가능)
  const result = [];
  qSizeRows.forEach(r => {
    if (!r.size || !r.cny) return;
    const expanded = _expandSizeRange(String(r.size), parseFloat(r.cny));
    result.push(...expanded);
  });
  if (result.length === 0) return null;
  return result;
}

// ── 시장 체크 ──
function marketCheck() {
  const model = document.getElementById('q-model').value.trim();
  if (!model) { alert('모델번호를 입력하세요'); document.getElementById('q-model').focus(); return; }
  const box = document.getElementById('market-check-result');
  box.style.display = 'block';
  box.innerHTML = '<span class="text-muted">시장 체크 중...</span>';
  fetch('/api/market-check', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model})})
    .then(r => r.json()).then(data => {
      if (data.error) { box.innerHTML = `<span style="color:var(--danger)">${data.error}</span>${data.hint ? '<br><span class="text-muted" style="font-size:11px">'+data.hint+'</span>' : ''}`; return; }
      const bgMap = {green:'#e6f9e6;border-color:#1a7a1a', yellow:'#fff8e0;border-color:#8a6d00', red:'#ffe6e6;border-color:#cc0000', gray:'#f0f0f0;border-color:#888'};
      const colorMap = {green:'#1a7a1a', yellow:'#8a6d00', red:'#cc0000', gray:'#888'};
      box.style.background = (bgMap[data.market_color]||bgMap.gray).split(';')[0];
      box.style.borderColor = colorMap[data.market_color] || '#888';
      let html = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">`;
      html += `<span style="font-weight:700;font-size:15px;color:${colorMap[data.market_color]||'#888'}">${data.market_type}</span>`;
      html += `<span style="font-size:12px;color:var(--text2)">평균 마진율: ${data.avg_margin_rate != null ? data.avg_margin_rate + '%' : 'N/A'}</span>`;
      html += `<span style="font-size:12px;color:var(--text2)">마진OK: ${data.profitable_count}/${data.total_count}</span>`;
      if (!data.has_kream_prices) html += `<span style="font-size:11px;color:var(--danger)">KREAM 가격 미수집 (큐 실행 후 재시도)</span>`;
      html += `</div>`;
      html += `<div style="font-size:12px;margin-bottom:6px">${data.message}</div>`;
      if (data.details && data.details.length > 0) {
        html += `<div style="display:flex;gap:4px;flex-wrap:wrap">`;
        data.details.forEach(d => {
          const mr = d.margin_rate;
          let c = '#888';
          if (mr != null) c = mr >= 10 ? '#1a7a1a' : mr >= 0 ? '#8a6d00' : '#cc0000';
          html += `<span style="display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;border:1px solid ${c};color:${c}">${d.size} ${mr != null ? mr+'%' : '-'}</span>`;
        });
        html += `</div>`;
      }
      box.innerHTML = html;
    }).catch(e => { box.innerHTML = `<span style="color:var(--danger)">오류: ${e.message}</span>`; });
}

// ── 큐 추가 ──
function queueAdd() {
  const model = document.getElementById('q-model').value.trim();
  if (!model) { alert('모델번호를 입력하세요'); document.getElementById('q-model').focus(); return; }

  // DOM에서 최신 사이즈 값 읽기
  document.querySelectorAll('#q-sizes-tbody input').forEach(el => {
    const rid = parseFloat(el.dataset.rid);
    const field = el.dataset.field;
    const row = qSizeRows.find(r => r.id === rid);
    if (row) row[field] = field === 'cny' ? parseFloat(el.value) || '' : el.value;
  });

  const isShoeMode = qSizeRows.some(r => r.size && r.size.trim() !== '');

  const payload = {
    model,
    category: document.getElementById('q-category').value,
    shipping: parseInt(document.getElementById('q-ship').value) || 8000,
    quantity: parseInt(document.getElementById('q-qty').value) || 1,
    bid_days: parseInt(document.getElementById('q-bid-days').value) || 30,
    bid_strategy: document.getElementById('q-bid-strategy').value,
  };

  if (isShoeMode) {
    const sizes = qBuildSizesFromInput();
    if (!sizes || sizes.length === 0) { alert('사이즈와 가격을 입력하세요'); return; }
    payload.sizes = sizes;
    payload.sizeSystem = 'KR';
    payload.category = '신발';
  } else {
    const cny = parseFloat(document.getElementById('q-cny').value);
    if (!cny || cny <= 0) { alert('중국 구매가(CNY)를 입력하세요'); return; }
    payload.cny = cny;
  }

  fetch('/api/queue/add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    if (res.ok) {
      queueData.push(res.item);
      queueRender();
      // 폼 초기화
      document.getElementById('q-model').value = '';
      document.getElementById('q-cny').value = '';
      document.getElementById('q-category').value = '';
      document.getElementById('q-bid-strategy').value = 'undercut';
      document.getElementById('q-cny-wrap').style.display = '';
      document.getElementById('q-same-price').checked = false;
      document.getElementById('q-same-price-area').style.display = 'none';
      document.getElementById('q-sizes-table-area').style.display = 'block';
      qSizeRows = [{ id: Date.now() + Math.random(), size: '', cny: '' }];
      qRenderSizeRows();
      document.getElementById('q-model').focus();
      triggerAutoExecIfEnabled();
    } else {
      alert(res.error || '추가 실패');
    }
  });
}

// ── 큐 테이블 렌더링 ──
function queueRender() {
  const tbody = document.getElementById('q-tbody');
  document.getElementById('q-count').textContent = queueData.length;

  if (queueData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="text-muted">큐가 비어있습니다. 위에서 상품을 추가하세요.</td></tr>';
    return;
  }

  const statusColors = {
    '대기': 'var(--text3)', '검색 중': 'var(--blue)', '계산 중': 'var(--warning)',
    '완료': 'var(--accent)', '실패': 'var(--danger)'
  };

  let html = '';
  queueData.forEach((item, i) => {
    const isMisc = item.category === '미분류';
    let catLabel;
    if (item.status === '완료' || item.status === '대기') {
      // 인라인 드롭다운
      catLabel = `<select class="form-select" style="height:26px;font-size:11px;width:95px;${isMisc?'border-color:var(--danger);color:var(--danger)':''}" onchange="queueChangeCategory(${item.id},this.value)">
        <option value="" ${!item.category?'selected':''}>자동 판별</option>
        <option value="가방" ${item.category==='가방'?'selected':''}>가방 (8%)</option>
        <option value="신발" ${item.category==='신발'?'selected':''}>신발 (13%)</option>
        <option value="의류" ${item.category==='의류'?'selected':''}>의류 (13%)</option>
        <option value="미분류" ${isMisc?'selected':''} style="color:var(--danger)">미분류</option>
      </select>${item.categoryAuto ? '<span style="font-size:9px;color:var(--text3);margin-left:2px">자동</span>' : ''}`;
    } else {
      catLabel = item.category || '<span class="text-muted">자동</span>';
    }
    const sc = statusColors[item.status] || 'var(--text3)';

    // 사이즈/가격 표시 — 항상 사이즈별 개별 표시
    let sizeLabel, cnyLabel;
    if (item.sizes && item.sizes.length > 0) {
      const szList = item.sizes.map(s => s.size);
      sizeLabel = `<div style="font-size:11px;line-height:1.6">${item.sizes.map(s => s.size).join('<br>')}</div>`;
      cnyLabel = `<div style="font-size:11px;line-height:1.6">${item.sizes.map(s => `¥${s.cny_price}`).join('<br>')}</div>`;
    } else {
      sizeLabel = item.size || '<span class="text-muted">ONE SIZE</span>';
      cnyLabel = item.cny != null ? `¥${item.cny}` : '-';
    }

    const modelLink = item.result
      ? `<a href="#" onclick="qShowDetail(${item.id});return false" style="color:var(--blue);font-weight:700;text-decoration:none" title="상세 보기">${item.model}</a>`
      : `<strong>${item.model}</strong>`;

    html += `<tr>
      <td>${i + 1}</td>
      <td>${modelLink}</td>
      <td>${catLabel}</td>
      <td>${sizeLabel}</td>
      <td>${cnyLabel}</td>
      <td>${item.shipping.toLocaleString()}</td>
      <td style="cursor:pointer" onclick="qEditQty(${item.id}, this)" title="클릭하여 수정"><span style="border-bottom:1px dotted var(--text3)">${item.quantity}</span></td>
      <td><select class="form-select" style="height:26px;font-size:11px;width:68px" onchange="queueChangeBidDays(${item.id},this.value)">
        <option value="30" ${(item.bid_days||30)==30?'selected':''}>30일</option>
        <option value="60" ${(item.bid_days||30)==60?'selected':''}>60일</option>
        <option value="90" ${(item.bid_days||30)==90?'selected':''}>90일</option>
      </select></td>
      <td><span style="color:${sc}; font-weight:600">${item.status}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-outline btn-sm" onclick="queueCopy(${item.id})" style="padding:2px 8px; font-size:11px; margin-right:3px" title="동일 품번으로 새 항목 추가">복사</button>
        <button class="btn btn-outline btn-sm" onclick="queueDelete(${item.id})" style="padding:2px 8px; font-size:11px">삭제</button>
      </td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function queueChangeCategory(id, cat) {
  fetch('/api/queue/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ category: cat, categoryAuto: false })
  }).then(r => r.json()).then(res => {
    if (res.ok) {
      const item = queueData.find(q => q.id === id);
      if (item) { item.category = cat; item.categoryAuto = false; }
    }
  });
}

function queueChangeBidDays(id, days) {
  const item = queueData.find(q => q.id === id);
  if (item) item.bid_days = parseInt(days);
  fetch('/api/queue/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ bid_days: parseInt(days) })
  });
}

// ── 큐 수량 인라인 편집 ──
function qEditQty(id, td) {
  const item = queueData.find(q => q.id === id);
  if (!item) return;
  const prev = item.quantity;
  td.innerHTML = `<input type="number" min="1" value="${prev}"
    style="width:48px;height:24px;font-size:12px;text-align:center;border:1px solid var(--accent);border-radius:4px;padding:0 4px"
    onclick="event.stopPropagation()"
    onblur="qSaveQty(${id}, this)"
    onkeydown="if(event.key==='Enter')this.blur(); if(event.key==='Escape'){this.dataset.cancel='1';this.blur();}">`;
  const input = td.querySelector('input');
  input.focus();
  input.select();
}

function qSaveQty(id, input) {
  if (input.dataset.cancel) { queueRender(); return; }
  const qty = Math.max(1, parseInt(input.value) || 1);
  const item = queueData.find(q => q.id === id);
  if (!item || qty === item.quantity) { queueRender(); return; }
  fetch('/api/queue/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ quantity: qty })
  }).then(r => r.json()).then(res => {
    if (res.ok) item.quantity = qty;
    queueRender();
  }).catch(() => queueRender());
}

// ── 결과 테이블 수량 저장 ──
function qSaveResultQty(id, val) {
  const qty = Math.max(1, parseInt(val) || 1);
  const item = queueData.find(q => q.id === id);
  if (!item) return;
  item.quantity = qty;
  fetch('/api/queue/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ quantity: qty })
  });
}

function queueDelete(id) {
  fetch('/api/queue/' + id, { method: 'DELETE' }).then(r => r.json()).then(res => {
    if (res.ok) { queueData = queueData.filter(q => q.id !== id); queueRender(); }
  });
}

function queueCopy(id) {
  const src = queueData.find(q => q.id === id);
  if (!src) return;

  // 복사할 데이터 구성 (같은 품번·원가·카테고리·전략, 상태는 대기 초기화)
  const payload = {
    model: src.model,
    cny: src.cny,
    category: src.category || '',
    size: src.size || '',
    shipping: src.shipping,
    quantity: src.quantity,
    bid_days: src.bid_days || 30,
    bid_strategy: src.bid_strategy || 'undercut',
    sizes: src.sizes ? JSON.parse(JSON.stringify(src.sizes)) : [],
    sizeSystem: src.sizeSystem || '',
  };

  // 결과가 있는 항목 복사: KREAM 재검색 없이 결과 테이블에 바로 추가
  const hasResult = src.result && src.status === '완료';
  if (hasResult) {
    payload.status = '완료';
    payload.result = JSON.parse(JSON.stringify(src.result));
    payload.gosi = src.gosi ? JSON.parse(JSON.stringify(src.gosi)) : null;
  }

  fetch('/api/queue/add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  })
    .then(r => r.json())
    .then(res => {
      if (res.ok) {
        queueData.push(res.item);
        queueRender();
        if (hasResult) {
          // 결과 테이블에 즉시 반영
          queueBuildResults();
          document.getElementById('q-result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          document.getElementById('q-tbody').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        triggerAutoExecIfEnabled();
      } else {
        alert('복사 실패: ' + (res.error || ''));
      }
    });
}

function queueClear() {
  if (queueData.length === 0) return;
  if (!confirm(`${queueData.length}건의 큐를 모두 삭제하시겠습니까?`)) return;
  fetch('/api/queue/clear', { method: 'DELETE' }).then(r => r.json()).then(res => {
    if (res.ok) { queueData = []; queueRender(); document.getElementById('q-result-card').style.display = 'none'; }
  });
}

// ── 일괄 실행 ──
function queueExecute() {
  const pending = queueData.filter(q => q.status === '대기' || q.status === '실패');
  if (pending.length === 0) { alert('실행할 대기 항목이 없습니다'); return; }

  // 미분류 경고 (카테고리를 사용자가 직접 입력한 경우는 무관, 비어있는 것만)
  // 일괄 실행 후 자동 판별 실패 시 "미분류"가 되므로, 여기서는 pass

  const btn = document.getElementById('q-exec-btn');
  btn.disabled = true; btn.textContent = '실행 중...';

  const logArea = document.getElementById('q-log');
  logArea.style.display = 'block';
  logArea.innerHTML = '<div class="text-muted">일괄 실행 시작...</div>';

  fetch('/api/queue/execute', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
  .then(r => r.json())
  .then(res => {
    if (!res.taskId) { btn.disabled = false; btn.textContent = '일괄 실행 (KREAM 검색 + 마진 계산)'; alert(res.error || 'API 오류'); return; }

    const poll = setInterval(() => {
      fetch('/api/queue/list').then(r => r.json()).then(qr => { queueData = qr.queue || []; queueRender(); });
      fetch('/api/task/' + res.taskId).then(r => r.json()).then(task => {
        if (task.logs) {
          logArea.innerHTML = task.logs.map(l => {
            const c = l.level === 'error' ? 'var(--danger)' : l.level === 'success' ? 'var(--accent)' : 'var(--text2)';
            return `<div style="color:${c}"><span style="color:var(--text3);font-size:11px">${l.time}</span> ${l.msg}</div>`;
          }).join('');
          logArea.scrollTop = logArea.scrollHeight;
        }
        if (task.status === 'done' || task.status === 'error') {
          clearInterval(poll); btn.disabled = false; btn.textContent = '일괄 실행 (KREAM 검색 + 마진 계산)';
          fetch('/api/queue/list').then(r => r.json()).then(qr => { queueData = qr.queue || []; queueRender(); queueBuildResults(); });
          loadBatchHistory();
        }
      }).catch(() => { clearInterval(poll); btn.disabled = false; btn.textContent = '일괄 실행 (KREAM 검색 + 마진 계산)'; });
    }, 2000);
  });
}

// ── 결과 테이블 ──
// 입찰 예정가 저장소: { itemId: price } 또는 { itemId_size: price }
let bidPrices = {};
// 모델번호 정렬 상태: null=원래순서, 'asc'=오름차순, 'desc'=내림차순
let qResultSortModel = null;

function qToggleSortModel() {
  if (!qResultSortModel) qResultSortModel = 'asc';
  else if (qResultSortModel === 'asc') qResultSortModel = 'desc';
  else qResultSortModel = null;
  queueBuildResults();
}

function roundUp1000(n) { return Math.ceil(n / 1000) * 1000; }

// 사이즈별 해외배송 즉시구매가 조회 (정확한 사이즈 매칭)
function _getSizeInstantBuy(item, sz) {
  if (!item.result) return 0;
  const r = item.result;

  // 1순위: sizeMargins의 instantBuyPrice (서버에서 계산된 값)
  if (sz && sz.instantBuyPrice) return sz.instantBuyPrice;

  // 2순위: sizeDeliveryPrices에서 해당 사이즈 직접 검색
  if (sz && r.sizeDeliveryPrices && r.sizeDeliveryPrices.length > 0) {
    const szStr = String(sz.size).trim();
    const szDigits = szStr.replace(/[^0-9.]/g, '');
    const sdp = r.sizeDeliveryPrices.find(s => {
      const sStr = String(s.size).trim();
      return sStr === szStr || sStr.replace(/[^0-9.]/g, '') === szDigits;
    });
    if (sdp) {
      // 해외배송 가격 우선 (우리는 해외배송 판매자)
      return sdp.buyOverseas || sdp.buyPrice || sdp.buyNormal || 0;
    }
  }

  // 3순위: 사이즈가 없는 경우 (ONE SIZE) → product-level
  if (!sz) return r.instantBuyPrice || 0;

  // 사이즈별 매칭 실패 → API 캡처 실패 가능성 → product-level fallback
  // (sizeDeliveryPrices가 비어있으면 사이즈별 데이터를 못 가져온 것)
  if (!r.sizeDeliveryPrices || r.sizeDeliveryPrices.length === 0) {
    return r.instantBuyPrice || 0;
  }
  return 0;
}

function getBidPrice(item, sz) {
  const defStrategy = document.getElementById('q-default-margin').value;
  const strategy = item.bid_strategy || item.selectedMargin || defStrategy;

  // 수동 입력 우선
  if (sz) {
    const key = `${item.id}_${sz.size}`;
    if (bidPrices[key] != null) return bidPrices[key];
  } else {
    if (bidPrices[item.id] != null) return bidPrices[item.id];
  }

  // 언더컷: 해당 사이즈의 해외배송 즉시구매가 - 설정금액
  if (strategy === 'undercut') {
    let kp = _getSizeInstantBuy(item, sz);
    const uc = SETTINGS.undercutAmount || 1000;
    return kp > 0 ? roundUp1000(kp - uc) : 0;
  }

  // 마진 기반 (10, 15, 20)
  if (sz) {
    const mg = (sz.margins || {})[`margin_${strategy}`];
    return mg ? roundUp1000(mg.sell_price) : 0;
  }
  const r = item.result;
  const mg = (r.margins || {})[`margin_${strategy}`];
  return mg ? roundUp1000(mg.sell_price) : 0;
}

function calcProfitForPrice(sellPrice, totalCost) {
  const s = calcSettlement(sellPrice);
  return { profit: s.settlement - totalCost, marginRate: totalCost > 0 ? Math.round((s.settlement - totalCost) / totalCost * 1000) / 10 : 0, settlement: s.settlement, totalFee: s.totalFee };
}

function queueBuildResults() {
  // 언더컷 옵션 레이블을 설정 금액에 맞게 갱신

  let completed = queueData.filter(q => q.status === '완료' && q.result);
  if (completed.length === 0) return;

  // 모델번호 정렬
  if (qResultSortModel) {
    completed = completed.slice().sort((a, b) => {
      const cmp = (a.model || '').localeCompare(b.model || '', 'ko');
      return qResultSortModel === 'asc' ? cmp : -cmp;

  }

  // 헤더 정렬 표시 업데이트

  const strategyDd = (itemId, cur) => {

      <option value="10" ${s==='10'?'selected':''}>마진10%</option>
      <option value="15" ${s==='15'?'selected':''}>마진15%</option>
      <option value="20" ${s==='20'?'selected':''}>마진20%</option>
      <option value="undercut" ${s==='undercut'?'selected':''}>언더컷 -${(SETTINGS.undercutAmount||1000).toLocaleString()}</option>
    </select>`;
  };

  let html = '';
  completed.forEach(item => {
    const r = item.result;
    const hasSizes = r.sizeMargins && r.sizeMargins.length > 0;

      <option value="가방" ${item.category==='가방'?'selected':''}>가방</option>
      <option value="신발" ${item.category==='신발'?'selected':''}>신발</option>
      <option value="의류" ${item.category==='의류'?'selected':''}>의류</option>

    </select>`;

    // 시장 분류 배지
    const mType = r.marketType || '';
    const mColor = r.marketColor || '';
    const mAvg = r.avgMarginRate != null ? r.avgMarginRate : '';
    let marketBadge = '';
    if (mType) {
      const bgMap = {green:'#e6f9e6;color:#1a7a1a', yellow:'#fff8e0;color:#8a6d00', red:'#ffe6e6;color:#cc0000', gray:'#f0f0f0;color:#888'};
      const bg = bgMap[mColor] || bgMap.gray;
      marketBadge = `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:${bg};white-space:nowrap" title="평균 마진율: ${mAvg != '' ? mAvg + '%' : 'N/A'}">${mType}</span>`;
    }

    if (!hasSizes) {
      const bp = getBidPrice(item);
      const pi = calcProfitForPrice(bp, r.totalCost || 0);
      const profitOk = pi.profit > 0;
      const profitColor = profitOk ? 'var(--accent)' : 'var(--danger)';
      const profitBg = pi.profit < 0 ? 'var(--danger);color:#fff'
                     : pi.profit < 5000 ? 'var(--danger-light)'
                     : pi.profit < 10000 ? 'var(--warning-light)'
                     : '';
      const profitWarn = pi.profit < 5000 ? ' 마진부족' : '';
      const myBidCell0 = renderMyBidCell(r.productId, item.size || 'ONE SIZE');

      const compBadge0 = renderCompBadge(r.comp);
      html += `<tr>
        <td><input type="checkbox" class="q-res-chk" data-id="${item.id}" ${profitOk ? 'checked' : ''}></td>
        <td><a href="#" onclick="qShowDetail(${item.id});return false" style="color:var(--blue);font-weight:700;text-decoration:none" title="클릭하여 상세 보기">${item.model}</a> ${marketBadge}</td>
